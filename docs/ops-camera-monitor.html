<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ASIAIR OPS · 监控</title>
<script src="ops-theme.js"></script>
<style>
:root{--toph:54px}
html,body{height:100%;overflow:hidden;margin:0}
#stage{position:fixed;inset:var(--toph) 0 0 0;background:var(--sky-bg,#0a0e1a);z-index:0;
  display:flex;align-items:stretch;justify-content:center;box-sizing:border-box;padding:58px 28px 44px}
#grid{display:flex;gap:20px;align-items:stretch;justify-content:center;width:100%;height:100%}
.pane{display:flex;flex-direction:column;justify-content:center;min-width:0;height:100%}
/* 标题栏:在画面外,不遮挡视频 */
.pcap{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 2px 8px}
.plabel{font:var(--lab-w) 13px var(--display);letter-spacing:.16em;color:var(--text);text-transform:var(--lab-tt)}
html[data-skin="B"] .plabel{letter-spacing:.08em}
.pmeta{display:inline-flex;align-items:center;gap:16px;font:400 12px var(--mono);color:var(--quiet);letter-spacing:.03em}
.prate{color:var(--ac);font-weight:400}
.pbadge{display:inline-flex;align-items:center;gap:6px;font:var(--lab-w) 11px var(--display);
  letter-spacing:.16em;color:var(--muted);text-transform:var(--lab-tt)}
.pbadge i{width:6px;height:6px;border-radius:50%;background:var(--quiet);transition:background .2s ease}
.pbadge.on{color:var(--good)} .pbadge.on i{background:var(--good)}
html[data-skin="B"] .pbadge i{border-radius:0}
/* 纯净视频区 */
.fwrap{flex:0 1 auto;min-height:0;display:flex;align-items:center;justify-content:center}
.frame{position:relative;aspect-ratio:16/9;max-width:100%;max-height:calc(100vh - var(--toph) - 150px);
  border:1px solid var(--line);background:var(--sky-bg);overflow:hidden}
cam-video{display:block;width:100%;height:100%}
cam-video video{display:block;width:100%;height:100%;object-fit:contain;background:var(--sky-bg)}
.poff{position:absolute;inset:0;z-index:2;display:none;align-items:center;justify-content:center;
  font:var(--lab-w) 15px var(--display);letter-spacing:.3em;color:var(--quiet);text-transform:var(--lab-tt)}
.poff.show{display:flex}

/* 单显 / 双画面 */
#stage[data-view="cam1"] .pane[data-cam="ulanqab2"],
#stage[data-view="cam2"] .pane[data-cam="ulanqab"]{display:none}
#stage[data-view="both"] .pane{flex:1 1 0}

/* 视图切换段控 */
.viewsel{position:fixed;left:50%;transform:translateX(-50%);top:calc(var(--toph) + 10px);z-index:7;
  display:inline-flex;border:1px solid var(--line);border-radius:var(--pill);overflow:hidden;background:rgba(0,0,0,.42)}
.viewsel button{appearance:none;-webkit-appearance:none;background:transparent;border:0;cursor:pointer;
  font:var(--lab-w) 12px var(--display);letter-spacing:.12em;color:var(--muted);text-transform:var(--lab-tt);
  padding:5px 15px;border-right:1px solid var(--line);transition:color .2s ease,background .2s ease}
.viewsel button:last-child{border-right:0}
.viewsel button.active{color:var(--ac);background:var(--ac-soft,rgba(212,175,116,.12))}

.hdr{position:fixed;left:28px;top:calc(var(--toph) + 8px);z-index:5;pointer-events:none}
.hdr h1{margin:0;font:var(--lab-w) 21px var(--display);letter-spacing:.1em;color:var(--text)}
html[data-skin="B"] .hdr h1{font:500 23px var(--display);letter-spacing:.05em}
.foot{position:fixed;left:28px;bottom:16px;z-index:5;font:400 12px var(--mono)}
.foot a{color:var(--ac);text-decoration:none;border-bottom:1px solid var(--ac-soft);transition:border-color .2s ease}
.foot a:hover{border-bottom-color:var(--ac)}
.stats{position:fixed;right:28px;bottom:16px;z-index:5;font:400 12px var(--mono);color:var(--quiet);
  pointer-events:none;letter-spacing:.04em}
.stats b{color:var(--ac);font-weight:400}

@media (max-width:640px){
  html,body{height:auto;min-height:100%;overflow:auto;-webkit-overflow-scrolling:touch}
  body{padding-top:var(--toph)}
  .hdr{position:static;padding:12px 16px 4px} .hdr h1{font-size:18px}
  .viewsel{position:static;transform:none;margin:4px 16px 8px;display:inline-flex}
  #stage{position:static;inset:auto;display:block;padding:4px 12px 0;background:transparent}
  #grid{display:block;height:auto}
  #stage .pane{display:block;height:auto;width:100%;margin-bottom:14px}
  #stage[data-view="cam1"] .pane[data-cam="ulanqab2"],
  #stage[data-view="cam2"] .pane[data-cam="ulanqab"]{display:none}
  .fwrap{display:block}
  .frame{max-height:none;width:100%}
  .foot{position:static;display:inline-block;padding:6px 16px}
  .stats{position:static;display:block;padding:0 16px calc(14px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>
<div id="stage" data-view="cam1">
  <div id="grid">
    <div class="pane" data-cam="ulanqab">
      <div class="pcap">
        <span class="plabel">监控 1</span>
        <span class="pmeta">传输 <b class="prate">—</b> <span class="pbadge"><i></i><span class="ptxt">连接中…</span></span></span>
      </div>
      <div class="fwrap"><div class="frame"><div class="poff">未连接</div></div></div>
    </div>
    <div class="pane" data-cam="ulanqab2">
      <div class="pcap">
        <span class="plabel">监控 2</span>
        <span class="pmeta">传输 <b class="prate">—</b> <span class="pbadge"><i></i><span class="ptxt">连接中…</span></span></span>
      </div>
      <div class="fwrap"><div class="frame"><div class="poff">未连接</div></div></div>
    </div>
  </div>
</div>
<div class="hdr seq d1"><h1 id="title">远程台 · 实时监控</h1></div>
<div class="viewsel seq d1">
  <button data-view="cam1">监控1</button>
  <button data-view="cam2">监控2</button>
  <button data-view="both">双画面</button>
</div>
<div class="foot seq d2"><a href="/camera-recordings">录像回放 →</a></div>
<div class="stats seq d2">接口 RTT <b id="lat">—</b></div>
<script type="module">
/**
 * VideoRTC v1.6.0 - Video player for go2rtc streaming application.
 *
 * All modern web technologies are supported in almost any browser except Apple Safari.
 *
 * Support:
 * - ECMAScript 2017 (ES8) = ES6 + async
 * - RTCPeerConnection for Safari iOS 11.0+
 * - IntersectionObserver for Safari iOS 12.2+
 * - ManagedMediaSource for Safari 17+
 *
 * Doesn't support:
 * - MediaSource for Safari iOS
 * - Customized built-in elements (extends HTMLVideoElement) because Safari
 * - Autoplay for WebRTC in Safari
 */
class VideoRTC extends HTMLElement {
    constructor() {
        super();

        this.DISCONNECT_TIMEOUT = 5000;
        this.RECONNECT_TIMEOUT = 15000;

        this.CODECS = [
            'avc1.640029',      // H.264 high 4.1 (Chromecast 1st and 2nd Gen)
            'avc1.64002A',      // H.264 high 4.2 (Chromecast 3rd Gen)
            'avc1.640033',      // H.264 high 5.1 (Chromecast with Google TV)
            'hvc1.1.6.L153.B0', // H.265 main 5.1 (Chromecast Ultra)
            'mp4a.40.2',        // AAC LC
            'mp4a.40.5',        // AAC HE
            'flac',             // FLAC (PCM compatible)
            'opus',             // OPUS Chrome, Firefox
        ];

        /**
         * [config] Supported modes (webrtc, webrtc/tcp, mse, hls, mp4, mjpeg).
         * @type {string}
         */
        this.mode = 'webrtc,mse,hls,mjpeg';

        /**
         * [Config] Requested medias (video, audio, microphone).
         * @type {string}
         */
        this.media = 'video,audio';

        /**
         * [config] Run stream when not displayed on the screen. Default `false`.
         * @type {boolean}
         */
        this.background = false;

        /**
         * [config] Run stream only when player in the viewport. Stop when user scroll out player.
         * Value is percentage of visibility from `0` (not visible) to `1` (full visible).
         * Default `0` - disable;
         * @type {number}
         */
        this.visibilityThreshold = 0;

        /**
         * [config] Run stream only when browser page on the screen. Stop when user change browser
         * tab or minimise browser windows.
         * @type {boolean}
         */
        this.visibilityCheck = true;

        /**
         * [config] WebRTC configuration
         * @type {RTCConfiguration}
         */
        this.pcConfig = {
            bundlePolicy: 'max-bundle',
            iceServers: [{urls: ['stun:stun.cloudflare.com:3478', 'stun:stun.l.google.com:19302']}],
            sdpSemantics: 'unified-plan',  // important for Chromecast 1
        };

        /**
         * [info] WebSocket connection state. Values: CONNECTING, OPEN, CLOSED
         * @type {number}
         */
        this.wsState = WebSocket.CLOSED;

        /**
         * [info] WebRTC connection state.
         * @type {number}
         */
        this.pcState = WebSocket.CLOSED;

        /**
         * @type {HTMLVideoElement}
         */
        this.video = null;

        /**
         * @type {WebSocket}
         */
        this.ws = null;

        /**
         * @type {string|URL}
         */
        this.wsURL = '';

        /**
         * @type {RTCPeerConnection}
         */
        this.pc = null;

        /**
         * @type {number}
         */
        this.connectTS = 0;

        /**
         * @type {string}
         */
        this.mseCodecs = '';

        /**
         * [internal] Disconnect TimeoutID.
         * @type {number}
         */
        this.disconnectTID = 0;

        /**
         * [internal] Reconnect TimeoutID.
         * @type {number}
         */
        this.reconnectTID = 0;

        /**
         * [internal] Handler for receiving Binary from WebSocket.
         * @type {Function}
         */
        this.ondata = null;

        /**
         * [internal] Handlers list for receiving JSON from WebSocket.
         * @type {Object.<string,Function>}
         */
        this.onmessage = null;
    }

    /**
     * Set video source (WebSocket URL). Support relative path.
     * @param {string|URL} value
     */
    set src(value) {
        if (typeof value !== 'string') value = value.toString();
        if (value.startsWith('http')) {
            value = 'ws' + value.substring(4);
        } else if (value.startsWith('/')) {
            value = 'ws' + location.origin.substring(4) + value;
        }

        this.wsURL = value;

        this.onconnect();
    }

    /**
     * Play video. Support automute when autoplay blocked.
     * https://developer.chrome.com/blog/autoplay/
     */
    play() {
        this.video.play().catch(() => {
            if (!this.video.muted) {
                this.video.muted = true;
                this.video.play().catch(er => {
                    console.warn(er);
                });
            }
        });
    }

    /**
     * Send message to server via WebSocket
     * @param {Object} value
     */
    send(value) {
        if (this.ws) this.ws.send(JSON.stringify(value));
    }

    /** @param {Function} isSupported */
    codecs(isSupported) {
        return this.CODECS
            .filter(codec => this.media.includes(codec.includes('vc1') ? 'video' : 'audio'))
            .filter(codec => isSupported(`video/mp4; codecs="${codec}"`)).join();
    }

    /**
     * `CustomElement`. Invoked each time the custom element is appended into a
     * document-connected element.
     */
    connectedCallback() {
        if (this.disconnectTID) {
            clearTimeout(this.disconnectTID);
            this.disconnectTID = 0;
        }

        // because video autopause on disconnected from DOM
        if (this.video) {
            const seek = this.video.seekable;
            if (seek.length > 0) {
                this.video.currentTime = seek.end(seek.length - 1);
            }
            this.play();
        } else {
            this.oninit();
        }

        this.onconnect();
    }

    /**
     * `CustomElement`. Invoked each time the custom element is disconnected from the
     * document's DOM.
     */
    disconnectedCallback() {
        if (this.background || this.disconnectTID) return;
        if (this.wsState === WebSocket.CLOSED && this.pcState === WebSocket.CLOSED) return;

        this.disconnectTID = setTimeout(() => {
            if (this.reconnectTID) {
                clearTimeout(this.reconnectTID);
                this.reconnectTID = 0;
            }

            this.disconnectTID = 0;

            this.ondisconnect();
        }, this.DISCONNECT_TIMEOUT);
    }

    /**
     * Creates child DOM elements. Called automatically once on `connectedCallback`.
     */
    oninit() {
        this.video = document.createElement('video');
        this.video.controls = true;
        this.video.playsInline = true;
        this.video.preload = 'auto';

        this.video.style.display = 'block'; // fix bottom margin 4px
        this.video.style.width = '100%';
        this.video.style.height = '100%';

        this.appendChild(this.video);

        this.video.addEventListener('error', ev => {
            const err = this.video.error;
            // https://developer.mozilla.org/en-US/docs/Web/API/MediaError/code
            const MEDIA_ERRORS = {
                1: 'MEDIA_ERR_ABORTED',
                2: 'MEDIA_ERR_NETWORK',
                3: 'MEDIA_ERR_DECODE',
                4: 'MEDIA_ERR_SRC_NOT_SUPPORTED'
            };
            console.error('[VideoRTC] Video error:', {
                error: err ? MEDIA_ERRORS[err.code] : 'unknown',
                message: err ? err.message : 'unknown',
                codecs: this.mseCodecs || 'not set',
                readyState: this.video.readyState,
                networkState: this.video.networkState,
                currentTime: this.video.currentTime
            });
            if (this.ws) this.ws.close(); // run reconnect for broken MSE stream
        });

        // all Safari lies about supported audio codecs
        const m = window.navigator.userAgent.match(/Version\/(\d+).+Safari/);
        if (m) {
            // AAC from v13, FLAC from v14, OPUS - unsupported
            const skip = m[1] < '13' ? 'mp4a.40.2' : m[1] < '14' ? 'flac' : 'opus';
            this.CODECS.splice(this.CODECS.indexOf(skip));
        }

        if (this.background) return;

        if ('hidden' in document && this.visibilityCheck) {
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    this.disconnectedCallback();
                } else if (this.isConnected) {
                    this.connectedCallback();
                }
            });
        }

        if ('IntersectionObserver' in window && this.visibilityThreshold) {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) {
                        this.disconnectedCallback();
                    } else if (this.isConnected) {
                        this.connectedCallback();
                    }
                });
            }, {threshold: this.visibilityThreshold});
            observer.observe(this);
        }
    }

    /**
     * Connect to WebSocket. Called automatically on `connectedCallback`.
     * @return {boolean} true if the connection has started.
     */
    onconnect() {
        if (!this.isConnected || !this.wsURL || this.ws || this.pc) return false;

        // CLOSED or CONNECTING => CONNECTING
        this.wsState = WebSocket.CONNECTING;

        this.connectTS = Date.now();

        this.ws = new WebSocket(this.wsURL);
        this.ws.binaryType = 'arraybuffer';
        this.ws.addEventListener('open', () => this.onopen());
        this.ws.addEventListener('close', () => this.onclose());

        return true;
    }

    ondisconnect() {
        this.wsState = WebSocket.CLOSED;
        if (this.ws) {
            this.ws.close();
            this.ws = null;
        }

        this.pcState = WebSocket.CLOSED;
        if (this.pc) {
            this.pc.getSenders().forEach(sender => {
                if (sender.track) sender.track.stop();
            });
            this.pc.close();
            this.pc = null;
        }

        this.video.src = '';
        this.video.srcObject = null;
    }

    /**
     * @returns {Array.<string>} of modes (mse, webrtc, etc.)
     */
    onopen() {
        // CONNECTING => OPEN
        this.wsState = WebSocket.OPEN;

        this.ws.addEventListener('message', ev => {
            if (typeof ev.data === 'string') {
                const msg = JSON.parse(ev.data);
                for (const mode in this.onmessage) {
                    this.onmessage[mode](msg);
                }
            } else {
                this.ondata(ev.data);
            }
        });

        this.ondata = null;
        this.onmessage = {};

        const modes = [];

        if (this.mode.includes('mse') && ('MediaSource' in window || 'ManagedMediaSource' in window)) {
            modes.push('mse');
            this.onmse();
        } else if (this.mode.includes('hls') && this.video.canPlayType('application/vnd.apple.mpegurl')) {
            modes.push('hls');
            this.onhls();
        } else if (this.mode.includes('mp4')) {
            modes.push('mp4');
            this.onmp4();
        }

        if (this.mode.includes('webrtc') && 'RTCPeerConnection' in window) {
            modes.push('webrtc');
            this.onwebrtc();
        }

        if (this.mode.includes('mjpeg')) {
            if (modes.length) {
                this.onmessage['mjpeg'] = msg => {
                    if (msg.type !== 'error' || msg.value.indexOf(modes[0]) !== 0) return;
                    this.onmjpeg();
                };
            } else {
                modes.push('mjpeg');
                this.onmjpeg();
            }
        }

        return modes;
    }

    /**
     * @return {boolean} true if reconnection has started.
     */
    onclose() {
        if (this.wsState === WebSocket.CLOSED) return false;

        // CONNECTING, OPEN => CONNECTING
        this.wsState = WebSocket.CONNECTING;
        this.ws = null;

        // reconnect no more than once every X seconds
        const delay = Math.max(this.RECONNECT_TIMEOUT - (Date.now() - this.connectTS), 0);

        this.reconnectTID = setTimeout(() => {
            this.reconnectTID = 0;
            this.onconnect();
        }, delay);

        return true;
    }

    onmse() {
        /** @type {MediaSource} */
        let ms;

        if ('ManagedMediaSource' in window) {
            const MediaSource = window.ManagedMediaSource;

            ms = new MediaSource();
            ms.addEventListener('sourceopen', () => {
                this.send({type: 'mse', value: this.codecs(MediaSource.isTypeSupported)});
            }, {once: true});

            this.video.disableRemotePlayback = true;
            this.video.srcObject = ms;
        } else {
            ms = new MediaSource();
            ms.addEventListener('sourceopen', () => {
                URL.revokeObjectURL(this.video.src);
                this.send({type: 'mse', value: this.codecs(MediaSource.isTypeSupported)});
            }, {once: true});

            this.video.src = URL.createObjectURL(ms);
            this.video.srcObject = null;
        }

        this.play();

        this.mseCodecs = '';

        this.onmessage['mse'] = msg => {
            if (msg.type !== 'mse') return;

            this.mseCodecs = msg.value;

            const sb = ms.addSourceBuffer(msg.value);
            sb.mode = 'segments'; // segments or sequence
            sb.addEventListener('updateend', () => {
                if (!sb.updating && bufLen > 0) {
                    try {
                        const data = buf.slice(0, bufLen);
                        sb.appendBuffer(data);
                        bufLen = 0;
                    } catch (e) {
                        // console.debug(e);
                    }
                }

                if (!sb.updating && sb.buffered && sb.buffered.length) {
                    const end = sb.buffered.end(sb.buffered.length - 1);
                    const start = end - 5;
                    const start0 = sb.buffered.start(0);
                    if (start > start0) {
                        sb.remove(start0, start);
                        ms.setLiveSeekableRange(start, end);
                    }
                    if (this.video.currentTime < start) {
                        this.video.currentTime = start;
                    }
                    const gap = end - this.video.currentTime;
                    this.video.playbackRate = gap > 0.1 ? gap : 0.1;
                    // console.debug('VideoRTC.buffered', gap, this.video.playbackRate, this.video.readyState);
                }
            });

            const buf = new Uint8Array(2 * 1024 * 1024);
            let bufLen = 0;

            this.ondata = data => {
                if (sb.updating || bufLen > 0) {
                    const b = new Uint8Array(data);
                    buf.set(b, bufLen);
                    bufLen += b.byteLength;
                    // console.debug('VideoRTC.buffer', b.byteLength, bufLen);
                } else {
                    try {
                        sb.appendBuffer(data);
                    } catch (e) {
                        // console.debug(e);
                    }
                }
            };
        };
    }

    onwebrtc() {
        const pc = new RTCPeerConnection(this.pcConfig);

        pc.addEventListener('icecandidate', ev => {
            if (ev.candidate && this.mode.includes('webrtc/tcp') && ev.candidate.protocol === 'udp') return;

            const candidate = ev.candidate ? ev.candidate.toJSON().candidate : '';
            this.send({type: 'webrtc/candidate', value: candidate});
        });

        pc.addEventListener('connectionstatechange', () => {
            if (pc.connectionState === 'connected') {
                const tracks = pc.getTransceivers()
                    .filter(tr => tr.currentDirection === 'recvonly') // skip inactive
                    .map(tr => tr.receiver.track);
                /** @type {HTMLVideoElement} */
                const video2 = document.createElement('video');
                video2.addEventListener('loadeddata', () => this.onpcvideo(video2), {once: true});
                video2.srcObject = new MediaStream(tracks);
            } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                pc.close(); // stop next events

                this.pcState = WebSocket.CLOSED;
                this.pc = null;

                this.onconnect();
            }
        });

        this.onmessage['webrtc'] = msg => {
            switch (msg.type) {
                case 'webrtc/candidate':
                    if (this.mode.includes('webrtc/tcp') && msg.value.includes(' udp ')) return;

                    pc.addIceCandidate({candidate: msg.value, sdpMid: '0'}).catch(er => {
                        console.warn(er);
                    });
                    break;
                case 'webrtc/answer':
                    pc.setRemoteDescription({type: 'answer', sdp: msg.value}).catch(er => {
                        console.warn(er);
                    });
                    break;
                case 'error':
                    if (!msg.value.includes('webrtc/offer')) return;
                    pc.close();
            }
        };

        this.createOffer(pc).then(offer => {
            this.send({type: 'webrtc/offer', value: offer.sdp});
        });

        this.pcState = WebSocket.CONNECTING;
        this.pc = pc;
    }

    /**
     * @param pc {RTCPeerConnection}
     * @return {Promise<RTCSessionDescriptionInit>}
     */
    async createOffer(pc) {
        try {
            if (this.media.includes('microphone')) {
                const media = await navigator.mediaDevices.getUserMedia({audio: true});
                media.getTracks().forEach(track => {
                    pc.addTransceiver(track, {direction: 'sendonly'});
                });
            }
        } catch (e) {
            console.warn(e);
        }

        for (const kind of ['video', 'audio']) {
            if (this.media.includes(kind)) {
                pc.addTransceiver(kind, {direction: 'recvonly'});
            }
        }

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        return offer;
    }

    /**
     * @param video2 {HTMLVideoElement}
     */
    onpcvideo(video2) {
        if (this.pc) {
            // Video+Audio > Video, H265 > H264, Video > Audio, WebRTC > MSE
            let rtcPriority = 0, msePriority = 0;

            /** @type {MediaStream} */
            const stream = video2.srcObject;
            if (stream.getVideoTracks().length > 0) {
                // not the best, but a pretty simple way to check a codec
                const isH265Supported =  this.pc.remoteDescription.sdp.includes('H265/90000');
                rtcPriority += isH265Supported ? 0x240 : 0x220;
            }
            if (stream.getAudioTracks().length > 0) rtcPriority += 0x102;

            if (this.mseCodecs.includes('hvc1.')) msePriority += 0x230;
            if (this.mseCodecs.includes('avc1.')) msePriority += 0x210;
            if (this.mseCodecs.includes('mp4a.')) msePriority += 0x101;

            if (rtcPriority >= msePriority) {
                this.video.srcObject = stream;
                this.play();

                this.pcState = WebSocket.OPEN;

                this.wsState = WebSocket.CLOSED;
                if (this.ws) {
                    this.ws.close();
                    this.ws = null;
                }
            } else {
                this.pcState = WebSocket.CLOSED;
                if (this.pc) {
                    this.pc.close();
                    this.pc = null;
                }
            }
        }

        video2.srcObject = null;
    }

    onmjpeg() {
        this.ondata = data => {
            this.video.controls = false;
            this.video.poster = 'data:image/jpeg;base64,' + VideoRTC.btoa(data);
        };

        this.send({type: 'mjpeg'});
    }

    onhls() {
        this.onmessage['hls'] = msg => {
            if (msg.type !== 'hls') return;

            const url = 'http' + this.wsURL.substring(2, this.wsURL.indexOf('/ws')) + '/hls/';
            const playlist = msg.value.replace('hls/', url);
            this.video.src = 'data:application/vnd.apple.mpegurl;base64,' + btoa(playlist);
            this.play();
        };

        this.send({type: 'hls', value: this.codecs(type => this.video.canPlayType(type))});
    }

    onmp4() {
        /** @type {HTMLCanvasElement} **/
        const canvas = document.createElement('canvas');
        /** @type {CanvasRenderingContext2D} */
        let context;

        /** @type {HTMLVideoElement} */
        const video2 = document.createElement('video');
        video2.autoplay = true;
        video2.playsInline = true;
        video2.muted = true;

        video2.addEventListener('loadeddata', () => {
            if (!context) {
                canvas.width = video2.videoWidth;
                canvas.height = video2.videoHeight;
                context = canvas.getContext('2d');
            }

            context.drawImage(video2, 0, 0, canvas.width, canvas.height);

            this.video.controls = false;
            this.video.poster = canvas.toDataURL('image/jpeg');
        });

        this.ondata = data => {
            video2.src = 'data:video/mp4;base64,' + VideoRTC.btoa(data);
        };

        this.send({type: 'mp4', value: this.codecs(this.video.canPlayType)});
    }

    static btoa(buffer) {
        const bytes = new Uint8Array(buffer);
        const len = bytes.byteLength;
        let binary = '';
        for (let i = 0; i < len; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return window.btoa(binary);
    }
}


// 基于 VideoRTC 派生一个「无任何角标」的纯视频元素
customElements.define('cam-video', class extends VideoRTC {});

(function(){
  var host = location.hostname, proto = location.protocol;
  var CAMS = [{key:"ulanqab", label:"监控 1"}, {key:"ulanqab2", label:"监控 2"}];
  var stage = document.getElementById("stage");
  var elLat = document.getElementById("lat");
  var siteName = (window.OPS && window.OPS.siteName) || "远程台";
  document.getElementById("title").textContent = siteName + " · 实时监控";

  var base = proto + "//" + host + ":1984/";
  var panes = {};
  CAMS.forEach(function(c){
    var pane = stage.querySelector('.pane[data-cam="'+c.key+'"]');
    var frame = pane.querySelector(".frame");
    var v = document.createElement("cam-video");
    v.background = false;            // 隐藏的那路自动暂停,省带宽
    v.src = new URL("api/ws?src=" + encodeURIComponent(c.key), base);
    frame.insertBefore(v, frame.firstChild);
    panes[c.key] = { el:v, frame:frame, pane:pane,
                     badge:pane.querySelector(".pbadge"), txt:pane.querySelector(".ptxt"),
                     off:pane.querySelector(".poff"), rate:pane.querySelector(".prate"),
                     lastT:-1, sLast:null, sLastT:0, rateEma:null };
  });

  function setBadge(o, live, label){
    if(live){ o.badge.classList.add("on"); o.txt.textContent="直播中"; o.off.classList.remove("show"); }
    else { o.badge.classList.remove("on"); o.txt.textContent=label; o.off.textContent=label; o.off.classList.add("show"); }
  }

  // 播放状态:看每路内部 <video> 的 currentTime 是否在前进(可靠,不靠 iframe load)
  function checkPlay(){
    CAMS.forEach(function(c){
      var o = panes[c.key];
      var hidden = (o.pane.offsetParent === null);   // 单显时另一路被隐藏
      if(hidden){ setBadge(o, false, "已暂停"); o.lastT = -1; return; }
      var vid = o.el.video;
      var t = (vid && typeof vid.currentTime === "number") ? vid.currentTime : 0;
      var playing = !!(vid && !vid.paused && t > 0 && t !== o.lastT);
      setBadge(o, playing, playing ? "" : "连接中…");
      o.lastT = t;
    });
  }
  setInterval(checkPlay, 1500);
  setTimeout(checkPlay, 800);

  // 单显/双画面切换 + 记忆
  var VIEW_KEY = "ops_cam_view";
  function setView(v){
    if(v!=="cam1" && v!=="cam2" && v!=="both") v="cam1";
    stage.setAttribute("data-view", v);
    try{ localStorage.setItem(VIEW_KEY, v); }catch(e){}
    Array.prototype.forEach.call(document.querySelectorAll(".viewsel button"), function(b){
      b.classList.toggle("active", b.getAttribute("data-view")===v);
    });
    setTimeout(checkPlay, 300);
  }
  Array.prototype.forEach.call(document.querySelectorAll(".viewsel button"), function(b){
    b.addEventListener("click", function(){ setView(b.getAttribute("data-view")); });
  });
  var saved="cam1"; try{ saved=localStorage.getItem(VIEW_KEY)||"cam1"; }catch(e){}
  setView(saved);

  function setTopH(){ var t=document.querySelector(".ops-top"); if(t&&t.offsetHeight) document.documentElement.style.setProperty("--toph", t.offsetHeight+"px"); }
  [0,150,400,900].forEach(function(d){ setTimeout(setTopH,d); });
  window.addEventListener("resize", setTopH);
  window.addEventListener("orientationchange", function(){ setTimeout(setTopH,200); });

  function fmtRate(bps){ if(!isFinite(bps)||bps<0) return "—"; return bps>=1e6 ? (bps/1e6).toFixed(1)+" Mbps" : Math.round(bps/1e3)+" kbps"; }

  function poll(){
    var t0 = performance.now();
    fetch("/api/camera/stats", {cache:"no-store"}).then(function(r){ return r.json(); }).then(function(d){
      var rtt = Math.round(performance.now() - t0);
      var ok = !!(d && d.ok);
      elLat.textContent = ok ? (rtt + " ms") : "—";
      var cams = (d && d.cameras) || null;
      CAMS.forEach(function(c){
        var o = panes[c.key];
        var bytes = null;
        if(cams && cams[c.key] && typeof cams[c.key].bytes === "number") bytes = cams[c.key].bytes;
        else if(c.key === "ulanqab" && typeof d.bytes === "number") bytes = d.bytes;
        if(ok && bytes != null){
          var now = performance.now();
          if(o.sLast != null && now > o.sLastT){
            var inst = (bytes - o.sLast) * 8 / ((now - o.sLastT) / 1000);
            if(isFinite(inst) && inst >= 0){ o.rateEma = (o.rateEma==null) ? inst : (o.rateEma*0.6 + inst*0.4); o.rate.textContent = fmtRate(o.rateEma); }
          }
          o.sLast = bytes; o.sLastT = now;
        } else { o.rate.textContent = "—"; }
      });
    }).catch(function(){ elLat.textContent="—"; CAMS.forEach(function(c){ panes[c.key].rate.textContent="—"; }); });
  }
  poll(); setInterval(poll, 2000);
})();
</script>
