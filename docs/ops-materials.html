<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASIAIR OPS · 素材库</title>
<script src="ops-theme.js"></script>
<style>
#bg{position:fixed;inset:0;width:100vw;height:100vh;z-index:0}
.wrap{position:relative;z-index:2;max-width:1460px;margin:0 auto;padding:76px 26px 20px;min-height:100vh;
  display:flex;flex-direction:column}
.wrap,.viewer{--mat-major:16px;--mat-control:14px;--mat-meta:12px;font-size:var(--mat-control)}

/* 编辑式刊头:标题 + 汇总 */
.head{display:flex;align-items:flex-end;gap:30px;flex-wrap:wrap;padding:8px 0 16px;border-bottom:1px solid var(--line)}
.head h1{margin:0;font:var(--lab-w) 30px var(--display);letter-spacing:.08em}
html[data-skin="B"] .head h1{font:500 38px var(--display);letter-spacing:.05em}
html[data-skin="C"] .head h1{font:300 30px var(--display);letter-spacing:.02em}
.head .meta{font:400 12px var(--mono);color:var(--muted)}
.head .spacer{flex:1}
.head .pl{text-align:right}
.head .pl .lab{font-size:var(--mat-meta);letter-spacing:.18em}
.head .pl .bignum{font-size:24px;margin-top:2px}
html[data-skin="B"] .head .pl .bignum{font-size:30px}
.tools{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:12px 0 4px}
select.ops-sel.small,input.search{background:transparent;color:var(--text);border:1px solid var(--line);
  border-radius:var(--pill);font:400 var(--mat-control) var(--body);padding:6px 14px}
input.search{min-width:260px}
input.search::placeholder{color:var(--quiet)}
input.search:focus-visible,select.ops-sel.small:focus-visible{outline:1px solid var(--ac);outline-offset:2px}
#load-more{font-size:var(--mat-control)}
.film .con-note{font-size:var(--mat-meta)}
html[data-skin="B"] .film .con-note{font-size:var(--mat-meta)}

/* 最新入库胶片条 */
.film{padding:16px 0 4px}
.film .fhead{display:flex;align-items:baseline;gap:12px;margin-bottom:9px}
.film .fhead b{font:var(--lab-w) var(--mat-major) var(--display);letter-spacing:.18em;color:var(--ac);text-transform:var(--lab-tt)}
.film .strip{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:thin}
.film .cell{flex:none;width:148px;cursor:pointer;position:relative}
.film .cell img,.film .cell .ph{width:148px;height:99px;object-fit:cover;display:flex;align-items:center;justify-content:center;filter:saturate(.9)}
.film .cell .ph,.thumb .ph,.folder .cov .ph{background:var(--line-dim);color:var(--quiet);font:600 var(--mat-meta) var(--mono);letter-spacing:.12em}
html[data-skin="B"] .film .cell img{border:1px solid var(--line)}
html[data-skin="C"] .film .cell img{border:1px solid var(--hair,#d8d6cf)}
.film .cell .cap{margin-top:5px;font:400 var(--mat-meta) var(--body);color:var(--quiet);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.film .cell:hover .cap{color:var(--text)}
.film .cell::after{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:var(--ac);transform:scaleX(0);transition:transform .25s}
.film .cell:hover::after{transform:scaleX(1)}

/* 目录索引:排版式行,不是卡片 */
.folders{padding:10px 0 2px}
.folder{display:flex;align-items:center;gap:18px;padding:13px 2px;border-bottom:1px solid var(--line-dim);cursor:pointer}
.folder:hover{border-bottom-color:var(--ac-soft)}
.folder .cov{width:74px;height:50px;flex:none;overflow:hidden;position:relative}
.folder .cov img,.folder .cov .ph{width:100%;height:100%;object-fit:cover;transform:scale(1);transition:transform .4s;display:flex;align-items:center;justify-content:center}
.folder:hover .cov img{transform:scale(1.12)}
.folder b{font:var(--lab-w) var(--mat-major) var(--display);letter-spacing:.12em}
html[data-skin="B"] .folder b{font:600 22px var(--display)}
.folder .ct{margin-left:auto;font:400 var(--mat-meta) var(--body);color:var(--muted)}
.folder .go{font:var(--lab-w) var(--mat-control) var(--display);letter-spacing:.08em;color:var(--quiet)}
.folder:hover .go{color:var(--ac)}

/* 缩略图墙 */
.grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));padding:16px 0}
.thumb{position:relative;cursor:pointer;opacity:0}
@media (prefers-reduced-motion:reduce){.thumb{opacity:1!important;animation:none!important}}
.thumb.in{animation:thIn .5s cubic-bezier(.2,.7,.3,1) forwards}
@keyframes thIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.thumb img,.thumb .ph{width:100%;aspect-ratio:3/2;object-fit:cover;display:flex;align-items:center;justify-content:center;background:var(--line-dim)}
html[data-skin="C"] .thumb img{border:1px solid var(--line)}
.thumb .ov{position:absolute;inset:auto 0 0 0;padding:18px 8px 6px;
  background:linear-gradient(0deg,rgba(0,0,0,.72),transparent);
  font:400 var(--mat-meta) var(--body);color:#ddd;opacity:0;transition:opacity .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
html[data-skin="C"] .thumb .ov{background:linear-gradient(0deg,rgba(247,246,241,.92),transparent);color:#1a1a1a}
.thumb:hover .ov{opacity:1}
.thumb::after{content:"";position:absolute;inset:0;border:1px solid transparent;transition:border-color .2s}
.thumb:hover::after{border-color:var(--ac-soft)}
.empty-note{padding:28px 0;font:italic 300 var(--mat-meta) var(--body);color:var(--quiet)}
html[data-skin="A"] .empty-note,html[data-skin="C"] .empty-note{font-style:normal}

/* 库维护入口:顶到页面底部、状态行之上,排版式无卡片 */
.admin-entry{display:flex;align-items:baseline;gap:16px;margin-top:auto;padding:15px 2px 13px;
  border-top:1px solid var(--line-dim);text-decoration:none;cursor:pointer}
.admin-entry .ae-lab{font:var(--lab-w) var(--mat-major) var(--display);letter-spacing:.16em;color:var(--ac);text-transform:var(--lab-tt)}
html[data-skin="B"] .admin-entry .ae-lab{font:600 18px var(--display)}
.admin-entry .ae-sub{font:400 var(--mat-meta) var(--body);color:var(--quiet)}
.admin-entry .ae-go{margin-left:auto;font:var(--lab-w) var(--mat-control) var(--display);letter-spacing:.1em;color:var(--quiet)}
.admin-entry:hover .ae-go,.admin-entry:hover .ae-sub{color:var(--ac)}
.statusline{margin-top:0}

/* ── 看图器 ── */
.viewer{position:fixed;inset:0;z-index:80;display:none;background:var(--bg)}
.viewer.open{display:block}
#vcanvas{position:absolute;inset:0;width:100vw;height:100vh;cursor:grab;touch-action:none}
#vcanvas.dragging{cursor:grabbing}
.v-top{position:absolute;left:22px;right:22px;top:14px;display:flex;align-items:center;gap:14px;z-index:5}
.v-top .name{font:400 var(--mat-meta) var(--body);color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.v-viewbar{position:absolute;left:24px;right:330px;top:66px;z-index:6;display:flex;justify-content:flex-end;align-items:center;gap:6px;
  padding:8px 14px;background:linear-gradient(180deg,var(--scrim) 55%,var(--scrim0));
  opacity:0;transform:translateY(-8px);transition:opacity .25s,transform .25s;pointer-events:none}
.v-viewbar.show{opacity:1;transform:none;pointer-events:auto}
.v-viewbar .con-note{margin-right:4px}
@media (hover:none){.v-viewbar{opacity:1;transform:none;pointer-events:auto}}
.v-load{position:absolute;left:calc(24px + (100vw - 354px)/2);top:calc(66px + (100vh - 236px)/2);transform:translate(-50%,-50%);z-index:4;
  font:var(--lab-w) var(--mat-major) var(--display);letter-spacing:.22em;color:var(--quiet);text-transform:var(--lab-tt)}
.v-rail{position:absolute;right:0;top:66px;bottom:120px;width:300px;z-index:5;
  padding:16px 22px 10px 18px;border-left:1px solid var(--ac-soft);overflow:auto;scrollbar-width:none;
  background:linear-gradient(270deg,var(--scrim) 62%,var(--scrim0))}
.v-rail::-webkit-scrollbar{display:none}
.v-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:28px;height:58px;
  display:flex;align-items:center;justify-content:center;
  font:300 34px/1 var(--display);color:var(--quiet);background:none;border:0;cursor:pointer;padding:0}
.v-nav:hover{color:var(--ac)}
.v-nav.prev{left:36px}.v-nav.next{right:366px}
.v-bottom{position:absolute;left:24px;right:330px;bottom:10px;z-index:5;
  padding:10px 14px 8px 0;background:linear-gradient(0deg,var(--scrim) 55%,var(--scrim0))}
.v-bottom .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.v-top button.con,.v-viewbar button.con,.v-bottom button.con{font-size:var(--mat-control)}
.v-top .con-note,.v-viewbar .con-note,.v-bottom .con-note{font-size:var(--mat-meta)}
html[data-skin="B"] .v-top .con-note,html[data-skin="B"] .v-viewbar .con-note,html[data-skin="B"] .v-bottom .con-note{font-size:var(--mat-meta)}
.viewer .hgroup h3{font-size:var(--mat-major)}
.viewer .hrow .k{font-size:var(--mat-control)}
.viewer .hrow .v{font-size:var(--mat-major)}
html[data-skin="B"] .viewer .hgroup h3{font-size:var(--mat-major)}
html[data-skin="B"] .viewer .hrow .k{font-size:var(--mat-control)}
html[data-skin="B"] .viewer .hrow .v{font-size:var(--mat-major)}
.v-bottom .lab{font-size:var(--mat-major)!important;letter-spacing:.18em}
.v-hist{height:74px;margin-top:7px;position:relative}
#vhist{position:absolute;inset:0;width:100%;height:100%}
@media (max-width:900px){.v-load{left:50%;top:50%}.v-viewbar{right:24px}.v-rail{display:none}.v-nav.prev{left:36px}.v-nav.next{right:36px}.v-bottom{right:24px}}

/* 入场编排修订:素材库的刊头汇总 / 工具 / 胶片条 / 目录索引 / 状态行都是异步填充的,
   若沿用主题层"加载即按时间轴淡入",慢网时空的目录容器会落在静态档位上,内容尚未就位,
   浮现顺序与节奏就乱了。做法:先把所有 .seq 暂停在隐藏起始态,等首次数据就绪(browse 结束)
   再统一放行,届时各段已填好内容,按 d1/d2/d3 自上而下依次浮现。reduce 用户不受影响(本块在 no-preference 内)。 */
@media (prefers-reduced-motion:no-preference){
  .seq{animation-play-state:paused}
  body.ready .seq{animation-play-state:running}
}

/* 目录索引:不再整块淡入,而是各目录行逐条依次浮现(像总览右栏那样一行一行)。
   .folders 自身是 .seq.d2,这里用一个近乎即时的 opacity 切换占住它在级联中的档位(.30s,与 d2 同步),
   不做时长淡入 —— 否则父级 opacity 渐变会"罩住"子行,行级错峰就看不出来了。
   行的浮现只在首次揭幕(.folders.reveal)期间生效,导航后会重新揭幕(见脚本)。
   注:缩略图墙 .grid/.thumb 已有自带的 thIn 逐格错峰,且不属于 .seq,此处不动。 */
@media (prefers-reduced-motion:no-preference){
  .folders.seq{opacity:0;transform:none;animation:none}
  body.ready .folders.seq{animation:matFrameIn .01s linear .30s forwards}
  @keyframes matFrameIn{to{opacity:1}}
  body.ready .folders.seq.reveal .folder{
    opacity:0;transform:translateY(6px);
    animation:opsSeq .46s cubic-bezier(.2,.7,.3,1) both;
    animation-delay:calc(.32s + var(--ri,0) * .07s);
  }
}
</style>
</head>
<body>
<canvas id="bg" aria-hidden="true"></canvas>

<main class="wrap">
  <header class="head seq">
    <h1 id="title">素材库</h1>
    <span class="spacer"></span>
    <div class="pl"><div class="lab">馆藏素材</div><div class="bignum" id="n-total">--</div></div>
    <div class="pl"><div class="lab">预览就绪</div><div class="bignum" id="n-ready">--</div></div>
  </header>

  <div class="tools seq d1">
    <select id="source-select" class="ops-sel small" aria-label="来源"></select>
    <input id="search" class="search" type="search" placeholder="在当前目录筛选(文件名 / 目标)">
  </div>

  <section class="film seq d1" id="film" style="display:none">
    <div class="fhead"><b>最新入库</b></div>
    <div class="strip" id="film-strip"></div>
  </section>

  <section class="folders seq d2" id="folders"></section>
  <section class="grid" id="grid"></section>
  <div class="empty-note" id="empty" style="display:none">此目录暂无素材。</div>

  <a class="admin-entry seq d3" href="/materials-admin">
    <span class="ae-lab">素材库维护</span>
    <span class="ae-sub">下载历史 · 空间占用 · 文件目录 · 大图预热</span>
    <span class="ae-go">进入 →</span>
  </a>

  <footer class="statusline seq d3">
    <span class="kind" id="status-kind" style="color:var(--good)">[—]</span>
    <span class="msg" id="status-text">连接素材库…</span>
    <span class="ts" id="snapshot">--</span>
  </footer>
</main>

<!-- 看图器 -->
<div class="viewer" id="viewer" aria-hidden="true">
  <canvas id="vcanvas"></canvas>
  <div class="v-load" id="v-load">正在调取档案大图…</div>
  <div class="v-top">
    <span class="name num" id="v-name">--</span>
    <button class="con" id="v-close" type="button">关闭 Esc</button>
  </div>
  <div class="v-viewbar" id="v-viewbar">
    <span class="con-note" id="v-zoom">--</span>
    <button class="con" id="v-fit" type="button">复位</button>
    <button class="con" id="v-100" type="button">100%</button>
    <button class="con" id="v-zoom-out" type="button">−</button>
    <button class="con" id="v-zoom-in" type="button">＋</button>
  </div>
  <button class="v-nav prev" id="v-prev" type="button" aria-label="上一张">‹</button>
  <button class="v-nav next" id="v-next" type="button" aria-label="下一张">›</button>
  <aside class="v-rail">
    <div class="hgroup"><h3><span class="rn">Ⅰ</span>档案</h3>
      <div class="hrow"><span class="k">目标</span><span class="v ac" id="m-target">--</span></div>
      <div class="hrow"><span class="k">帧型</span><span class="v" id="m-frame">--</span></div>
      <div class="hrow"><span class="k">拍摄于</span><span class="v" id="m-cap">--</span></div>
    </div>
    <div class="hgroup"><h3><span class="rn">Ⅱ</span>曝光</h3>
      <div class="hrow"><span class="k">曝光</span><span class="v" id="m-exp">--</span></div>
      <div class="hrow"><span class="k">Bin / Gain</span><span class="v" id="m-bg">--</span></div>
      <div class="hrow"><span class="k">传感器温度</span><span class="v" id="m-temp">--</span></div>
    </div>
    <div class="hgroup"><h3><span class="rn">Ⅲ</span>文件</h3>
      <div class="hrow"><span class="k">大小</span><span class="v" id="m-size">--</span></div>
      <div class="hrow"><span class="k">设备 / 来源</span><span class="v" id="m-dev">--</span></div>
      <div class="hrow"><span class="k">入库于</span><span class="v dim" id="m-idx">--</span></div>
    </div>
  </aside>
  <div class="v-bottom">
    <div class="row">
      <b class="lab" style="font-size:16px;color:var(--ac)">直方图拉伸</b>
      <button class="con on" id="vs-auto" type="button">自动</button>
      <button class="con" id="vs-strong" type="button">强拉伸</button>
      <button class="con" id="vs-linear" type="button">原图</button>
      <span class="con-note">滚轮缩放 · 拖拽平移 · ←→ 切换</span>
    </div>
    <div class="v-hist"><canvas id="vhist"></canvas></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const OPS=window.OPS;
const css=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const REDUCED=matchMedia("(prefers-reduced-motion: reduce)").matches;
const esc=s=>String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

/* ── 背景星空(与总览同源,密度更低) ── */
(function bg(){
  const cv=$("bg"),ctx=cv.getContext("2d");
  let stars=[];let s=7;const rnd=()=>{s^=s<<13;s^=s>>>17;s^=s<<5;return((s>>>0)/4294967296);};
  function seed(){const n=Math.round(innerWidth*innerHeight/16000);
    stars=Array.from({length:n},()=>({x:rnd(),y:rnd(),m:rnd(),ph:rnd()*6.28,sp:.4+rnd()}));}
  seed();addEventListener("resize",seed);
  (function draw(t){
    const w=innerWidth,h=innerHeight,dpr=devicePixelRatio||1;
    if(cv.width!==w*dpr||cv.height!==h*dpr){cv.width=w*dpr;cv.height=h*dpr;}
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.fillStyle=css("--sky-bg");ctx.fillRect(0,0,w,h);
    ctx.fillStyle=css("--sky-star");
    for(const st of stars){
      const tw=REDUCED?1:(.7+.3*Math.sin(t/1000*st.sp+st.ph));
      ctx.globalAlpha=(.08+st.m*.3)*tw;
      ctx.beginPath();ctx.arc(st.x*w,st.y*h,st.m>.93?1.5:.8,0,7);ctx.fill();
    }
    ctx.globalAlpha=1;requestAnimationFrame(draw);
  })(0);
})();

/* ── 状态与导航 ── */
const SP=()=>new URLSearchParams(location.search);
let pageDevice=SP().get("device")||"";
function currentDevice(){return OPS.device||pageDevice||"";}
function setPageDevice(name){
  if(!name)return;
  pageDevice=name;
  if(!OPS.device)OPS.device=name;
}
let curPath=SP().get("path")||"";
let curPage=1; const PAGE_SIZE=60;
{const uq=SP().get("q"); if(uq)$("search").value=uq;}
function syncUrl(){
  const p=SP();
  const dev=currentDevice();dev?p.set("device",dev):p.delete("device");
  curPath?p.set("path",curPath):p.delete("path");
  const src=$("source-select").value; src?p.set("source",src):p.delete("source");
  const kw=$("search").value.trim(); kw?p.set("q",kw):p.delete("q");
  history.replaceState(null,"",location.pathname+"?"+p.toString());
}
let listing=null,summary=null,curImages=[],revealed=false;
function nav(path){ curPath=path; curPage=1; syncUrl(); browse(); }
addEventListener("popstate",()=>{ curPath=SP().get("path")||""; curPage=1; browse(); });

function q(extra){
  const p=new URLSearchParams(extra||{});
  const dev=currentDevice();if(dev)p.set("device",dev);
  const src=$("source-select").value;if(src)p.set("source",src);
  return p.toString();
}
function thumbMarkup(src,alt){
  const title=esc(alt||"");
  if(!src)return `<span class="ph" title="${title}">NO THUMB</span>`;
  return `<img data-thumb loading="lazy" src="${esc(src)}" alt="${title}">`;
}
function installThumbFallback(root){
  root.querySelectorAll("img[data-thumb]").forEach(img=>{
    img.addEventListener("error",()=>{
      const ph=document.createElement("span");
      ph.className="ph";ph.textContent="NO THUMB";ph.title=img.alt||"";
      img.replaceWith(ph);
    },{once:true});
  });
}
function libraryUpdatedAt(data){
  return (data&&data.library_updated_at)||(data&&data.scan&&data.scan.library_updated_at)||"";
}
function displayTime(value){
  return value?String(value).replace("T"," "):"--";
}
function renderLibraryStatus(data){
  const scan=(data&&data.scan)||{};
  const updated=libraryUpdatedAt(data)||scan.finished_at||"";
  $("status-kind").textContent="";
  $("status-kind").style.display="none";
  $("status-text").textContent=scan.running?"素材库更新中":"素材库更新时间";
  $("snapshot").textContent=displayTime(scan.running?(scan.started_at||updated):updated);
}

/* ── 汇总 + 来源 ── */
async function loadSummary(){
  try{
    summary=await OPS.fetchJSON("/api/materials/summary?"+q());
    $("n-total").textContent=summary.total??"--";
    $("n-ready").textContent=summary.preview_ready??"--";
    renderLibraryStatus(summary);
    /* 最新入库:仅根目录展示 */
    if(!curPath&&Array.isArray(summary.latest)&&summary.latest.length){
      $("film").style.display="";
      const strip=$("film-strip");strip.innerHTML="";
      summary.latest.forEach(it=>{
        const c=document.createElement("div");c.className="cell";
        const src=Object.prototype.hasOwnProperty.call(it,"thumb_url")?it.thumb_url:(it.id?`/api/materials/thumb?id=${encodeURIComponent(it.id)}`:"");
        c.innerHTML=`${thumbMarkup(src,it.file_name||it.target||"")}
          <div class="cap">${it.target||it.frame_type||""} · ${it.exposure||""} · ${it.device}</div>`;
        c.addEventListener("click",()=>openViewer(summary.latest,summary.latest.indexOf(it)));
        strip.appendChild(c);
        installThumbFallback(c);
      });
    }else $("film").style.display="none";
  }catch(e){/* 汇总失败不阻塞浏览 */}
}

/* ── 目录浏览 ── */
async function browse(){
  try{
    {const p=new URLSearchParams({path:curPath,page:String(curPage),page_size:String(PAGE_SIZE)});
    const dev=currentDevice();if(dev)p.set("device",dev);
    const src=$("source-select").value;if(src)p.set("source",src);
    const kw=$("search").value.trim();if(kw)p.set("q",kw);
    const got=await OPS.fetchJSON(`/api/materials/browse?${p}`);
    if(curPage>1&&listing){
      const seen=new Set((listing.images||[]).map(x=>x.id));
      const fresh=(got.images||[]).filter(x=>!seen.has(x.id));
      listing.images=(listing.images||[]).concat(fresh);
      listing.image_total=got.image_total??listing.image_total;
      listing._noMore=fresh.length===0;
    }else listing=got;
    syncUrl();}
    renderTitle();renderListing();
    renderLibraryStatus(listing);
    loadSummary();
  }catch(e){
    $("status-kind").style.display="";
    $("status-kind").textContent="[ERR]";$("status-kind").style.color="var(--bad)";
    $("status-text").textContent="素材库加载失败:"+(e.message||"接口不可达");
    $("snapshot").textContent="--";
  }finally{
    /* 首次加载结束(成功或失败)后统一放行入场动画,保证自上而下且内容已就位 */
    if(!revealed){revealed=true;requestAnimationFrame(()=>{
      document.body.classList.add("ready");
      /* body.ready 之前 renderListing 已渲染过目录,但级联需在揭幕后才可见;此处补一次揭幕 */
      revealFolders();
    });}
  }
}
/* 目录索引逐行浮现:仅在 body.ready 后生效;每次导航重新揭幕,级联跑完即移除 .reveal,
   以免下一次渲染(或浏览器复用动画状态)残留。renderListing 渲染后调用。 */
let _folderRevealT=null,_foldersSig=null;
function revealFolders(){
  if(!document.body.classList.contains("ready"))return;  /* 首次揭幕由 load 的 finally 补触发 */
  const fr=$("folders");if(!fr)return;
  const n=fr.querySelectorAll(".folder").length;
  if(!n){fr.classList.remove("reveal");return;}
  fr.classList.remove("reveal");
  void fr.offsetWidth;            /* 强制回流,确保导航后能重放级联 */
  fr.classList.add("reveal");
  clearTimeout(_folderRevealT);
  _folderRevealT=setTimeout(()=>fr.classList.remove("reveal"),320+n*70+800);
}
function renderTitle(){
  const bc=listing.breadcrumbs||[];
  const last=bc[bc.length-1];
  $("title").textContent=curPath?(last?last.label:curPath.split("/").pop()):"素材库";
}
function matchSearch(it,kw){
  if(!kw)return true;kw=kw.toLowerCase();
  return (it.file_name||"").toLowerCase().includes(kw)||(it.target||"").toLowerCase().includes(kw);
}
function renderListing(){
  const folders=(listing.folders||[]);
  const fr=$("folders");fr.innerHTML="";
  folders.forEach((f,i)=>{
    const el=document.createElement("div");el.className="folder";
    el.style.setProperty("--ri",i);   /* 逐行浮现顺序索引(仅在揭幕 .folders.reveal 期间被 CSS 使用) */
    el.innerHTML=`<span class="cov">${thumbMarkup(f.cover_thumb_url,f.name)}</span>
      <b>${f.name}</b><span class="ct num">${f.item_count} 项</span><span class="go">进入 →</span>`;
    el.addEventListener("click",()=>nav(f.path));
    fr.appendChild(el);
    installThumbFallback(el);
  });
  /* 仅当目录集变化(导航/换源)才重新逐行揭幕;搜索去抖、加载更多(目录不变)不重放 */
  const _fsig=folders.map(f=>f.path).join("|");
  if(_fsig!==_foldersSig){_foldersSig=_fsig;revealFolders();}
  curImages=(listing.images||[]);
  const g=$("grid");g.innerHTML="";
  curImages.forEach((it,i)=>{
    const el=document.createElement("div");el.className="thumb";
    el.style.animationDelay=Math.min(i,24)*28+"ms";
    el.innerHTML=`${thumbMarkup(it.thumb_url,it.file_name)}
      <div class="ov">${it.target||""} · ${it.exposure||""} · Gain${it.gain??"-"} · ${ (it.captured_at||"").slice(5,16).replace("T"," ") }</div>`;
    el.addEventListener("click",()=>openViewer(curImages,i));
    requestAnimationFrame(()=>el.classList.add("in"));
    g.appendChild(el);
    installThumbFallback(el);
  });
  {let more=$("load-more");
   if(!more){more=document.createElement("button");more.id="load-more";more.className="con";more.type="button";
     more.textContent="载入更多";more.style.cssText="margin:6px auto 14px;display:block";
     more.addEventListener("click",()=>{curPage++;browse();});
     g.parentNode.insertBefore(more,g.nextSibling);}
   const total=listing.image_total??curImages.length;
   more.style.display=(curImages.length<total&&!listing._noMore)?"":"none";}
  $("empty").style.display=(!folders.length&&!curImages.length)?"":"none";
}
let _qT=null;
$("search").addEventListener("input",()=>{clearTimeout(_qT);_qT=setTimeout(()=>{curPage=1;browse();},350);});

/* 来源选择:取自设备表 */
(async function initSources(){
  try{
    const d=await OPS.fetchJSON("/api/devices");
    const dev=(d.devices||[]).find(x=>x.name===(OPS.device||d.default_device))||d.devices[0];
    if(dev)setPageDevice(dev.name);
    const sel=$("source-select");sel.innerHTML="";
    (dev&&dev.source_roots||[]).forEach(s=>{
      const o=document.createElement("option");o.value=o.textContent=s.label;sel.appendChild(o);});
    {const us=SP().get("source"); if(us&&[...sel.options].some(o=>o.value===us))sel.value=us;}
    sel.addEventListener("change",()=>{curPage=1;browse();});
  }catch(e){}
  browse();
})();

/* ════════ 看图器:本地拉伸 + 缩放平移 ════════ */
const vc=$("vcanvas"),vctx=vc.getContext("2d");
let vList=[],vIdx=0,vSrc=null,vW=0,vH=0,vGray=null,vHistArr=new Float64Array(256);
let vWork=document.createElement("canvas"),vWctx=vWork.getContext("2d");
let vStf="auto",vView={x:0,y:0,z:1,fit:true};
function mtf(x,m){if(x<=0)return 0;if(x>=1)return 1;return ((m-1)*x)/(((2*m-1)*x)-m);}
function mtfInv(x0,y0){const m=x0*(y0-1)/(2*x0*y0-x0-y0);return Math.min(.99,Math.max(.01,m));}

function openViewer(list,idx){
  vList=list;vIdx=idx;
  $("viewer").classList.add("open");
  document.body.style.overflow="hidden";
  loadView();
}
function closeViewer(){
  $("viewer").classList.remove("open");
  document.body.style.overflow="";
}
$("v-close").addEventListener("click",closeViewer);
$("v-prev").addEventListener("click",()=>{vIdx=(vIdx-1+vList.length)%vList.length;loadView();});
$("v-next").addEventListener("click",()=>{vIdx=(vIdx+1)%vList.length;loadView();});
addEventListener("keydown",e=>{
  if(!$("viewer").classList.contains("open"))return;
  if(e.key==="Escape")closeViewer();
  if(e.key==="ArrowLeft")$("v-prev").click();
  if(e.key==="ArrowRight")$("v-next").click();
});

function loadView(){
  const it=vList[vIdx];if(!it)return;
  $("v-load").style.display="";$("v-load").textContent="正在调取档案大图…";
  $("v-name").textContent=`${vIdx+1}/${vList.length} · ${it.file_name}`;
  $("m-target").textContent=it.target||"--";
  $("m-frame").textContent=it.frame_type||"--";
  $("m-cap").textContent=(it.captured_at||"--").replace("T"," ");
  $("m-exp").textContent=it.exposure||(it.exposure_seconds?it.exposure_seconds+"s":"--");
  $("m-bg").textContent=`Bin${it.bin??"-"} / ${it.gain??"-"}`;
  $("m-temp").textContent=it.temperature_c!=null?it.temperature_c+" °C":"--";
  $("m-size").textContent=OPS.fmtBytes(it.size_bytes);
  $("m-dev").textContent=`${it.device} / ${it.source_label||""}`;
  $("m-idx").textContent=(it.indexed_at||"--").replace("T"," ");
  const img=new Image();
  img.onload=()=>{
    vW=img.naturalWidth;vH=img.naturalHeight;
    vWork.width=vW;vWork.height=vH;
    vWctx.drawImage(img,0,0);
    const d=vWctx.getImageData(0,0,vW,vH).data;
    vGray=new Uint8Array(vW*vH);
    for(let i=0,j=0;i<vGray.length;i++,j+=4)
      vGray[i]=(d[j]*0.299+d[j+1]*0.587+d[j+2]*0.114)|0;
    vHistArr.fill(0);
    for(let i=0;i<vGray.length;i+=4)vHistArr[vGray[i]]++;
    vSrc=img;vView.fit=true;
    $("v-load").style.display="none";
    applyVStf(vStf);
  };
  img.onerror=async()=>{
    $("v-load").textContent="预览生成中…";
    for(let i=0;i<20;i++){
      await new Promise(r=>setTimeout(r,1500));
      try{const st=await OPS.fetchJSON(`/api/materials/preview-status?id=${encodeURIComponent(it.id)}`);
        const ready=st&&st.item&&st.item.preview_status==="ready";
        if(ready){img.src=it.preview_url+(it.preview_url.includes("?")?"&":"?")+"t="+Date.now();return;}
        if(st&&st.item&&st.item.preview_error){$("v-load").textContent="预览生成失败:"+st.item.preview_error;return;}
      }catch(e){break;}
    }
    $("v-load").textContent="大图暂不可用";
  };
  img.src=it.preview_url;
}
function vStats(){
  let n=0;for(let i=0;i<256;i++)n+=vHistArr[i];
  let acc=0,med=0,lo=0,hi=1,a=0;
  for(let i=0;i<256;i++){acc+=vHistArr[i];if(acc>=n/2){med=i/255;break;}}
  for(let i=0;i<256;i++){a+=vHistArr[i];if(a>=n*.01){lo=i/255;break;}}
  a=0;for(let i=0;i<256;i++){a+=vHistArr[i];if(a>=n*.997){hi=i/255;break;}}
  return {med,lo,hi};
}
function applyVStf(kind){
  vStf=kind;
  ["vs-auto","vs-strong","vs-linear"].forEach(id=>$(id).classList.toggle("on",
    id==="vs-"+kind));
  if(!vSrc)return;
  if(kind==="linear"){vWctx.drawImage(vSrc,0,0);}
  else{
    const {med,lo,hi}=vStats();
    const b=Math.max(0,lo),w=Math.min(1,Math.max(hi,b+.05));
    const medp=Math.min(.99,Math.max(.001,(med-b)/(w-b)));
    const m=mtfInv(medp,kind==="strong"?.5:.3);
    const lut=new Uint8ClampedArray(256);
    for(let i=0;i<256;i++)lut[i]=Math.round(mtf(((i/255)-b)/Math.max(1e-4,w-b),m)*255);
    vWctx.drawImage(vSrc,0,0);
    const id=vWctx.getImageData(0,0,vW,vH),px=id.data;
    for(let j=0;j<px.length;j+=4){px[j]=lut[px[j]];px[j+1]=lut[px[j+1]];px[j+2]=lut[px[j+2]];}
    vWctx.putImageData(id,0,0);
  }
  drawV();drawVHist();
}
$("vs-auto").addEventListener("click",()=>applyVStf("auto"));
$("vs-strong").addEventListener("click",()=>applyVStf("strong"));
$("vs-linear").addEventListener("click",()=>applyVStf("linear"));

function vVP(){
  const wide=innerWidth>900;
  const x=24,y=66;
  const w=innerWidth-x-(wide?330:24);
  const h=innerHeight-y-(wide?170:Math.round(innerHeight*.5));
  return {x,y,w:Math.max(40,w),h:Math.max(40,h)};
}
function clampVView(){
  if(!vW||!vH)return;
  const vp=vVP(),iw=vW*vView.z,ih=vH*vView.z;
  if(iw<=vp.w)vView.x=vp.x+(vp.w-iw)/2;
  else vView.x=Math.min(vp.x,Math.max(vp.x+vp.w-iw,vView.x));
  if(ih<=vp.h)vView.y=vp.y+(vp.h-ih)/2;
  else vView.y=Math.min(vp.y,Math.max(vp.y+vp.h-ih,vView.y));
}
function drawV(){
  const w=innerWidth,h=innerHeight,dpr=devicePixelRatio||1;
  if(vc.width!==w*dpr||vc.height!==h*dpr){vc.width=w*dpr;vc.height=h*dpr;}
  vctx.setTransform(dpr,0,0,dpr,0,0);
  vctx.fillStyle=css("--bg");vctx.fillRect(0,0,w,h);
  if(!vSrc)return;
  const vp=vVP();
  if(vView.fit){
    vView.z=Math.min(vp.w/vW,vp.h/vH,1.6);
    vView.x=vp.x+(vp.w-vW*vView.z)/2;vView.y=vp.y+(vp.h-vH*vView.z)/2;
  }
  clampVView();
  vctx.strokeStyle=css("--line");vctx.lineWidth=1;
  vctx.strokeRect(vp.x+.5,vp.y+.5,vp.w-1,vp.h-1);
  vctx.strokeStyle=css("--ac-soft");
  const T=14;
  for(const [cx,cy,dx,dy] of [[vp.x,vp.y,1,1],[vp.x+vp.w,vp.y,-1,1],[vp.x,vp.y+vp.h,1,-1],[vp.x+vp.w,vp.y+vp.h,-1,-1]]){
    vctx.beginPath();vctx.moveTo(cx+dx*T,cy);vctx.lineTo(cx,cy);vctx.lineTo(cx,cy+dy*T);vctx.stroke();
  }
  vctx.save();
  vctx.beginPath();vctx.rect(vp.x,vp.y,vp.w,vp.h);vctx.clip();
  vctx.imageSmoothingEnabled=vView.z<1;
  vctx.drawImage(vWork,vView.x,vView.y,vW*vView.z,vH*vView.z);
  vctx.restore();
  $("v-zoom").textContent=Math.round(vView.z*100)+"%";
}
function drawVHist(){
  const cv=$("vhist"),ctx=cv.getContext("2d");
  const w=cv.clientWidth,h=cv.clientHeight,dpr=devicePixelRatio||1;
  if(cv.width!==w*dpr||cv.height!==h*dpr){cv.width=w*dpr;cv.height=h*dpr;}
  ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,w,h);
  ctx.strokeStyle=css("--line");ctx.strokeRect(.5,.5,w-1,h-1);
  let mx=0;for(let i=1;i<255;i++)mx=Math.max(mx,vHistArr[i]);
  if(!mx)return;
  ctx.fillStyle=css("--muted");ctx.globalAlpha=.85;
  const bw=w/256;
  for(let i=0;i<256;i++){
    const v=Math.log1p(vHistArr[i])/Math.log1p(mx);
    ctx.fillRect(i*bw,h-v*(h-5),Math.max(1,bw-0.4),v*(h-5));
  }
  ctx.globalAlpha=1;
}
function zoomVAt(f,cx,cy){
  if(!vSrc)return;
  const vp=vVP(),ox=cx??(vp.x+vp.w/2),oy=cy??(vp.y+vp.h/2);
  const nz=Math.min(8,Math.max(.05,vView.z*f));
  vView.x=ox-(ox-vView.x)*(nz/vView.z);
  vView.y=oy-(oy-vView.y)*(nz/vView.z);
  vView.z=nz;vView.fit=false;drawV();
}
(function vPointer(){
  let drag=null;
  vc.addEventListener("pointerdown",e=>{drag={x:e.clientX,y:e.clientY,vx:vView.x,vy:vView.y};
    vc.classList.add("dragging");vc.setPointerCapture(e.pointerId);});
  vc.addEventListener("pointermove",e=>{if(!drag)return;
    vView.fit=false;vView.x=drag.vx+(e.clientX-drag.x);vView.y=drag.vy+(e.clientY-drag.y);drawV();});
  vc.addEventListener("pointerup",()=>{drag=null;vc.classList.remove("dragging");});
  vc.addEventListener("wheel",e=>{e.preventDefault();
    zoomVAt(e.deltaY>0?1/1.15:1.15,e.clientX,e.clientY);},{passive:false});
  vc.addEventListener("dblclick",()=>{vView.fit=true;drawV();});
  const vbar=$("v-viewbar");
  document.addEventListener("mousemove",e=>{
    if(!$("viewer").classList.contains("open")){vbar.classList.remove("show");return;}
    const vp=vVP();
    const inside=e.clientX>=vp.x&&e.clientX<=vp.x+vp.w&&e.clientY>=vp.y&&e.clientY<=vp.y+vp.h+40;
    vbar.classList.toggle("show",inside);
  });
  document.documentElement.addEventListener("mouseleave",()=>vbar.classList.remove("show"));
  $("v-fit").addEventListener("click",()=>{vView.fit=true;drawV();});
  $("v-100").addEventListener("click",()=>{vView.fit=false;vView.z=1;
    const vp=vVP();vView.x=vp.x+(vp.w-vW)/2;vView.y=vp.y+(vp.h-vH)/2;drawV();});
  $("v-zoom-in").addEventListener("click",()=>zoomVAt(1.25));
  $("v-zoom-out").addEventListener("click",()=>zoomVAt(1/1.25));
  addEventListener("resize",()=>{if($("viewer").classList.contains("open"))drawV();});
})();
OPS.onSkin(()=>{drawV();drawVHist();});
</script>
