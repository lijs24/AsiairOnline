      }
    }

    function exposurePayloadFromForm() {
      return {
        exposure_seconds: Number($("exposure-input").value),
        bin: Number($("bin-select").value),
      };
    }

    function cameraPayloadFromForm() {
      const controls = (state.lastCameraState && state.lastCameraState.controls) || {};
      const payload = {};
      const setNumberIfChanged = (key, nextValue, currentValue, epsilon = 0.0001) => {
        if (currentValue == null || !Number.isFinite(Number(currentValue)) || Math.abs(Number(nextValue) - Number(currentValue)) > epsilon) {
          payload[key] = nextValue;
        }
      };
      const setBoolIfChanged = (key, nextValue, currentValue) => {
        if (currentValue == null || Boolean(nextValue) !== Boolean(currentValue)) {
          payload[key] = nextValue;
        }
      };

      setNumberIfChanged("gain", Number($("gain-input").value), controls.gain && controls.gain.value);
      setNumberIfChanged("offset", Number($("offset-input").value), controls.offset && controls.offset.value);
      setNumberIfChanged("target_temp", Number($("target-temp-input").value), controls.target_temp && controls.target_temp.value, 0.01);
      setNumberIfChanged("frame_size", Number($("frame-size-select").value), controls.frame_size && controls.frame_size.raw_value);
      setBoolIfChanged("cooler_on", $("cooler-on").checked, controls.cooler_on && controls.cooler_on.value);
      setBoolIfChanged("anti_dew_heater", $("anti-dew").checked, controls.anti_dew_heater && controls.anti_dew_heater.value);
      setBoolIfChanged("hardware_bin", $("hardware-bin").checked, controls.hardware_bin && controls.hardware_bin.value);
      setBoolIfChanged("fan_half_speed", $("fan-half-speed").checked, controls.fan_half_speed && controls.fan_half_speed.value);
      setBoolIfChanged("led_on", $("led-on").checked, controls.led_on && controls.led_on.value);
      return payload;
    }

    async function postCameraAction(action, extraPayload) {
      state.cameraBusy = true;
      syncCameraControlAvailability();
      const operationId = (window.crypto && crypto.randomUUID)
        ? crypto.randomUUID()
        : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      renderOperationProgress({ step: 0, total: 1, label: "准备相机操作", state: "running" });
      startOperationPoll(operationId);
      try {
        const response = await fetch("/api/camera-action", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            device: state.device,
            session_id: state.sessionId,
            operation_id: operationId,
            action,
            ...(extraPayload || {})
          }),
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
        clearEditedFields();
        if (payload.status) renderCameraState(payload.status);
        if (payload.operation) renderOperationProgress(payload.operation);
        setStatus("OK", action === "shutter" ? `${state.device} 已发送快门` : `${state.device} 参数已写入`, "ok");
        setTimeout(() => {
          if (state.operationProgress && state.operationProgress.operation_id === operationId) {
            state.operationProgress = null;
            renderExposureProgress();
          }
        }, 1800);
        return payload;
      } catch (error) {
        await pollCameraOperation(operationId).catch(() => {});
        setStatus("ERR", error.message || String(error), "warn");
        throw error;
      } finally {
        stopOperationPoll();
        state.cameraBusy = false;
        syncCameraControlAvailability();
      }
    }

    function renderPayload(payload) {
      state.lastPayload = payload;
      $("title-device").textContent = payload.device ? payload.device.name : state.device;

      if (!payload.ok) {
        $("title-state").textContent = payload.needs_refresh ? "尚未取图" : "异常";
        $("title-state").className = "badge err";
        $("title-size").textContent = "--";
        $("metric-strip").innerHTML = [
          metric("图像", "--"),
          metric("尺寸", "--"),
          metric("图像曝光", "--"),
          metric("距上次取图", payload.needs_refresh ? "尚未取图" : "异常", "err")
        ].join("");
        setFrameEmpty(payload.needs_refresh ? "NO FRAME" : "LOAD FAILED");
        state.rawValues = null;
        state.rawMeta = null;
        state.histogram = null;
        setStretchControlsEnabled(false);
        $("stretch-readout").textContent = payload.needs_refresh ? "等待原始图像" : "图像不可用";
        drawHistogram();
        $("image-meta").innerHTML = pair("状态", payload.error || "未加载", "err");
        $("image-id").textContent = "--";
        $("status-age").textContent = "--";
        setStatus(payload.needs_refresh ? "EMPTY" : "ERR", payload.error || "尚未取图", payload.needs_refresh ? "warn" : "err");
        return;
      }

      const image = payload.image || {};
      const displayWidth = image.original_width || image.width;
      const displayHeight = image.original_height || image.height;
      const displaySizeText = `${fmt(displayWidth)} × ${fmt(displayHeight)}`;
      const previewSizeText = image.sample_step && image.sample_step > 1
        ? `${fmt(image.width)} × ${fmt(image.height)}`
        : displaySizeText;
      $("title-state").textContent = payload.refreshed ? "刚取图" : "已取图";
      $("title-state").className = payload.refreshed ? "badge" : "badge warn";
      $("title-size").textContent = displaySizeText;
      $("image-id").textContent = fmt(image.image_id);

      $("metric-strip").innerHTML = [
        metric("图像 ID", fmt(image.image_id)),
        metric("尺寸", displaySizeText),
        metric("图像曝光", `${fmtExposureMs(image.exposure_ms)} · Bin ${fmt(image.bin)}`),
        metric("距上次取图", payload.refreshed ? "刚刚" : fmtAge(payload.age_seconds), payload.age_seconds > 60 ? "warn" : "")
      ].join("");

      $("image-meta").innerHTML = [
        pair("采集尺寸", displaySizeText),
        pair("显示尺寸", previewSizeText),
        pair("图像 ID", fmt(image.image_id)),
        pair("Bin", fmt(image.bin)),
        pair("图像曝光", fmtExposureMs(image.exposure_ms)),
        pair("拉取时间", payload.generated_at || "--"),
        pair("距上次取图", fmtAge(payload.age_seconds), payload.age_seconds > 60 ? "warn" : "ok"),
        pair("原始包", fmtBytes(image.packet_bytes)),
        pair("预览 Raw", fmtBytes(image.raw_bytes)),
        pair("拉伸", image.stretch ? `${image.stretch.low}-${image.stretch.high}` : "--")
      ].join("");

      $("status-age").textContent = fmtAge(payload.age_seconds);
      setStatus(payload.refreshed ? "OK" : "CACHE", payload.refreshed ? "已从设备拉取最新图像" : "显示上次取图结果", payload.refreshed ? "ok" : "warn");
    }

    async function loadImage(force = false) {
      if (state.busy) return;
      state.busy = true;
      $("refresh-btn").disabled = true;
      try {
        const params = new URLSearchParams({ device: state.device });
        if (force) params.set("refresh", "1");
        const response = await fetch(`/api/current-image?${params.toString()}`, { cache: "no-store" });
        const payload = await response.json();
        renderPayload(payload);
        if (payload.ok) await loadRawFrame(payload);
      } catch (error) {
        renderPayload({ ok: false, error: error.message || String(error), device: { name: state.device } });
      } finally {
        state.busy = false;
        $("refresh-btn").disabled = false;
      }
    }

    function setAuto(enabled) {
      state.auto = enabled;
      $("auto-btn").textContent = enabled ? "停止自动" : "自动刷新";
      if (state.autoTimer) clearInterval(state.autoTimer);
      state.autoTimer = null;
      if (enabled) {
        state.autoTimer = setInterval(() => loadImage(true), 15000);
      }
    }

    function bind() {
      const viewport = $("image-viewport");
      [
        "exposure-input",
        "bin-select",
        "gain-input",
        "offset-input",
        "target-temp-input",
        "frame-size-select",
        "cooler-on",
        "anti-dew",
        "hardware-bin",
        "fan-half-speed",
        "led-on"
      ].forEach((id) => {
        const el = $(id);
        if (!el) return;
        el.addEventListener("input", () => markFieldEdited(id));
        el.addEventListener("change", () => markFieldEdited(id));
      });
      $("shutter-btn").addEventListener("click", async () => {
        try {
          const exposurePayload = exposurePayloadFromForm();
          await postCameraAction("shutter", exposurePayload);
          state.exposureTrack = {
            key: `manual|${Number(exposurePayload.exposure_seconds || 0) * 1000}`,
            startedAt: Date.now(),
            durationMs: Math.max(0, Number(exposurePayload.exposure_seconds || 0) * 1000),
            captureState: "exposing",
          };
          renderExposureProgress();
          setTimeout(() => { loadCameraState(); }, 900);
          setTimeout(() => { loadImage(true); }, Math.max(1500, Math.round(Number(exposurePayload.exposure_seconds || 0) * 1000) + 900));
        } catch (_) {}
      });
      $("refresh-btn").addEventListener("click", () => loadImage(true));
      $("auto-btn").addEventListener("click", () => setAuto(!state.auto));
      $("apply-exposure-btn").addEventListener("click", async () => {
        try {
          const payload = await postCameraAction("apply_exposure", exposurePayloadFromForm());
          setTimeout(() => { loadCameraState(); }, Number(payload && payload.refresh_after_ms) || 600);
        } catch (_) {}
      });
      $("apply-camera-btn").addEventListener("click", async () => {
        try {
          const requestPayload = cameraPayloadFromForm();
          if (!Object.keys(requestPayload).length) {
            setStatus("IDLE", `${state.device} 相机参数没有变化`, "warn");
            return;
          }
          const payload = await postCameraAction("apply_camera", requestPayload);
          const delay = Number(payload && payload.refresh_after_ms) || 1200;
          setTimeout(() => { loadCameraState(); }, delay);
          setTimeout(() => { loadCameraState(); }, delay + 1800);
        } catch (_) {}
      });
      $("stretch-stf").addEventListener("click", () => applyStretchPreset("stf"));
      $("stretch-strong").addEventListener("click", () => applyStretchPreset("strong"));
      $("stretch-linear").addEventListener("click", () => applyStretchPreset("linear"));
      $("stretch-toggle").addEventListener("click", () => setStretchCollapsed(!state.stretchCollapsed));
      $("black-handle").addEventListener("pointerdown", (event) => {
        state.stretchDrag = "black";
        event.preventDefault();
      });
      $("source-handle").addEventListener("pointerdown", (event) => {
        state.stretchDrag = "source";
        event.preventDefault();
      });
      $("target-handle").addEventListener("pointerdown", (event) => {
        state.stretchDrag = "target";
        event.preventDefault();
      });
      $("white-handle").addEventListener("pointerdown", (event) => {
        state.stretchDrag = "white";
        event.preventDefault();
      });
      document.addEventListener("pointermove", (event) => {
        if (!state.stretchDrag || !state.rawValues) return;
        const rect = $("stretch-bar").getBoundingClientRect();
        const x = clamp((event.clientX - rect.left) / rect.width, 0, 1);
        const current = stretchState();
        if (state.stretchDrag === "black") {
          state.stretch.black = clamp(x, 0, current.white - 0.001);
          state.stretch.sourceMid = clamp(
            (current.sourcePosition - state.stretch.black) / Math.max(0.001, current.white - state.stretch.black),
            0.001,
            0.999
          );
        } else if (state.stretchDrag === "white") {
          state.stretch.white = clamp(x, current.black + 0.001, 1);
          state.stretch.sourceMid = clamp(
            (current.sourcePosition - current.black) / Math.max(0.001, state.stretch.white - current.black),
            0.001,
            0.999
          );
        } else if (state.stretchDrag === "source") {
          state.stretch.sourceMid = clamp(
            (x - current.black) / Math.max(0.001, current.white - current.black),
            0.001,
            0.999
          );
        } else if (state.stretchDrag === "target") {
          state.stretch.targetMid = clamp(x, 0.001, 0.999);
        }
        state.stretch.mode = "manual";
        renderRawCanvas();
      });
      document.addEventListener("pointerup", () => {
        state.stretchDrag = null;
      });
      viewport.addEventListener("wheel", (event) => {
        if (!canvasHasImage()) return;
        event.preventDefault();
        const factor = event.deltaY < 0 ? 1.12 : (1 / 1.12);
        zoomAtPoint(event.clientX, event.clientY, factor);
      }, { passive: false });
      viewport.addEventListener("pointerdown", (event) => {
        if (event.button !== 0 || !canvasHasImage()) return;
        if (event.target && String(event.target.id || "").includes("handle")) return;
        if (viewport.scrollWidth <= viewport.clientWidth + 1 && viewport.scrollHeight <= viewport.clientHeight + 1) return;
        state.view.dragging = true;
        state.view.pointerId = event.pointerId;
        state.view.dragStartX = event.clientX;
        state.view.dragStartY = event.clientY;
        state.view.dragScrollLeft = viewport.scrollLeft;
        state.view.dragScrollTop = viewport.scrollTop;
        viewport.setPointerCapture(event.pointerId);
        updateViewportCursor();
        event.preventDefault();
      });
      viewport.addEventListener("pointermove", (event) => {
        if (!state.view.dragging || state.view.pointerId !== event.pointerId) return;
        viewport.scrollLeft = state.view.dragScrollLeft - (event.clientX - state.view.dragStartX);
        viewport.scrollTop = state.view.dragScrollTop - (event.clientY - state.view.dragStartY);
      });
      function stopViewportDrag(event) {
        if (state.view.pointerId !== null && event.pointerId !== undefined && state.view.pointerId !== event.pointerId) return;
        state.view.dragging = false;
        state.view.pointerId = null;
        updateViewportCursor();
      }
      viewport.addEventListener("pointerup", stopViewportDrag);
      viewport.addEventListener("pointercancel", stopViewportDrag);
      viewport.addEventListener("lostpointercapture", stopViewportDrag);
      window.addEventListener("resize", () => {
        updateViewportFit(false);
        drawHistogram();
      });
      $("open-monitor").addEventListener("click", () => {
        location.href = `/monitor-minterm?device=${encodeURIComponent(state.device)}`;
      });
      $("role-select").addEventListener("change", async () => {
        const requestedRole = $("role-select").value === "controller" ? "controller" : "monitor";
        try {
          await syncRole(requestedRole);
        } catch (_) {
          $("role-select").value = state.controlState && state.controlState.held_by_self ? "controller" : roleForDevice(state.device);
        }
      });
      $("device-select").addEventListener("change", async () => {
        const nextDevice = $("device-select").value;
        state.device = nextDevice;
        state.desiredRole = roleForDevice(nextDevice);
        history.replaceState(null, "", `/camera?device=${encodeURIComponent(state.device)}`);
        $("overview-link").href = `/monitor-minterm?device=${encodeURIComponent(state.device)}`;
        $("preview-link").href = `/camera?device=${encodeURIComponent(state.device)}`;
        $("materials-link").href = `/materials?device=${encodeURIComponent(state.device)}`;
        setAuto(false);
        fetchControlState().catch(() => {});
        loadImage(false);
        if (!renderSelectedCameraState()) loadCameraStates();
      });
      window.addEventListener("pagehide", releaseAllControlBeacons);
      window.addEventListener("beforeunload", releaseAllControlBeacons);
    }

    async function boot() {
      state.sessionId = ensureSessionId();
      state.sessionLabel = sessionLabelFromId(state.sessionId);
      state.desiredRoleMap = readStoredRoleMap();
      await loadDevices();
      state.desiredRole = roleForDevice(state.device);
      renderDevices();
      bind();
      setStretchControlsEnabled(false);
      updateStretchHandles();
      drawHistogram();
      $("role-select").value = state.desiredRole;
      setClock();
      setInterval(setClock, 1000);
      state.exposureTicker = setInterval(renderExposureProgress, 200);
      state.cameraTimer = setInterval(loadCameraStates, 3000);
      state.captureTimer = setInterval(loadCaptureProgress, 1000);
      loadCaptureProgress().catch(() => {});
      startControlPolling();
      refreshControlLease().catch(() => {});
      syncCameraControlAvailability();
      loadCameraStates();
      loadImage(false);
    }

    boot().catch((error) => {
      setStatus("ERR", error.message || String(error), "err");
    });
  </script>
</body>
</html>
