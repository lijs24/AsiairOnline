<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASIAIR OPS · 网络连接</title>
<script src="ops-theme.js"></script>
<style>
#bg{position:fixed;inset:0;width:100vw;height:100vh;z-index:0}
.wrap{position:relative;z-index:2;max-width:1460px;margin:0 auto;padding:76px 26px 26px;min-height:100vh;
  display:flex;flex-direction:column}
.wrap{--nw-major:16px;--nw-ctrl:14px;--nw-meta:12px;font-size:var(--nw-ctrl)}

.head{display:flex;align-items:flex-end;gap:30px;flex-wrap:wrap;padding:8px 0 16px;border-bottom:1px solid var(--line)}
.head h1{margin:0;font:var(--lab-w) 30px var(--display);letter-spacing:.08em}
html[data-skin="B"] .head h1{font:500 38px var(--display);letter-spacing:.05em}
.head .sub{font:italic 300 13px var(--body);color:var(--quiet);margin-left:4px}
.head .spacer{flex:1}
.head .pl{text-align:right}
.head .pl .lab{font-size:var(--nw-meta);letter-spacing:.18em;color:var(--muted)}
.head .pl .bignum{font-size:24px;margin-top:2px;font-variant-numeric:tabular-nums}
html[data-skin="B"] .head .pl .bignum{font-size:30px}

.sect{padding:24px 0 8px;border-top:1px solid var(--line-dim)}
.sect h2{margin:0 0 6px;font:var(--lab-w) 16px var(--display);letter-spacing:.16em;color:var(--text);
  text-transform:var(--lab-tt);display:flex;align-items:baseline;gap:13px}
html[data-skin="B"] .sect h2{font-weight:600;font-size:20px;letter-spacing:.12em}
.sect h2 .rn{color:var(--ac);font-size:16px;letter-spacing:.06em}

/* 连接灯 */
.lamp{width:9px;height:9px;border-radius:50%;flex:none;background:var(--quiet)}
.lamp.on{background:var(--ac);box-shadow:0 0 7px var(--ac-soft);animation:nwPulse 1.6s ease-in-out infinite}
.lamp.warn{background:var(--ac-soft)}
.lamp.off{background:var(--bad)}
@keyframes nwPulse{0%,100%{opacity:1}50%{opacity:.45}}

/* 盒子→后端:每设备一行 */
.dev{display:flex;align-items:center;gap:16px;padding:15px 2px;border-bottom:1px solid var(--line-dim)}
.dev .lamp{margin-right:2px}
.dev .id{min-width:11em}
.dev .id b{font:var(--lab-w) var(--nw-major) var(--display);letter-spacing:.1em;color:var(--text)}
html[data-skin="B"] .dev .id b{font:600 19px var(--display)}
.dev .id .ip{display:block;margin-top:2px;font:400 var(--nw-meta) var(--mono);color:var(--quiet);letter-spacing:.02em}
.dev .st{font:var(--lab-w) var(--nw-ctrl) var(--display);letter-spacing:.06em;min-width:5em}
.dev .st.ok{color:var(--ac)} .dev .st.bad{color:var(--bad)} .dev .st.warn{color:var(--muted)}
.dev .meta{margin-left:auto;display:flex;gap:30px;align-items:baseline}
.dev .meta .m{text-align:right}
.dev .meta .m .v{font:400 var(--nw-major) var(--mono);color:var(--text);font-variant-numeric:tabular-nums}
.dev .meta .m .v.bad{color:var(--bad)}
.dev .meta .m .l{font:var(--lab-w) 10.5px var(--display);letter-spacing:.14em;color:var(--muted);text-transform:var(--lab-tt);margin-top:2px}
.dev .meta .m .proof{font:400 var(--nw-meta) var(--mono);color:var(--quiet);max-width:16em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* 后端→前端:本会话面板 */
.sess{display:grid;grid-template-columns:auto 1fr;gap:0 50px;align-items:start;margin-top:8px}
@media (max-width:820px){.sess{grid-template-columns:1fr}}
.sess .lat{display:flex;flex-direction:column;gap:4px}
.sess .lat .big{font:400 52px/1 var(--mono);color:var(--ac);font-variant-numeric:tabular-nums}
.sess .lat .big.off{color:var(--bad)}
.sess .lat .big .u{font-size:20px;color:var(--muted);margin-left:4px}
.sess .lat .l{font:var(--lab-w) var(--nw-meta) var(--display);letter-spacing:.16em;color:var(--muted);text-transform:var(--lab-tt)}
.sess .lat .mmm{font:400 var(--nw-meta) var(--mono);color:var(--quiet);font-variant-numeric:tabular-nums;margin-top:6px}
.sess .right{display:flex;flex-direction:column;gap:14px}
.spark{height:84px;position:relative;border-bottom:1px solid var(--line-dim)}
#spark{position:absolute;inset:0;width:100%;height:100%}
.kv{display:flex;flex-direction:column;gap:0}
.kv .row{display:flex;align-items:baseline;gap:12px;padding:8px 2px;border-bottom:1px solid var(--line-dim)}
.kv .row.note-row{border-bottom:none;padding:2px 2px 8px}
.kv .row .k{font:var(--lab-w) var(--nw-ctrl) var(--display);letter-spacing:.1em;color:var(--muted);text-transform:var(--lab-tt)}
.kv .row .v{margin-left:auto;font:400 var(--nw-ctrl) var(--mono);color:var(--text);font-variant-numeric:tabular-nums;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:24em;text-align:right;direction:ltr}
.dev[title]{cursor:help}

.statusline{margin-top:auto;padding-top:18px}

@media (prefers-reduced-motion:no-preference){
  .seq{animation-play-state:paused}
  body.ready .seq{animation-play-state:running}
}
/* 手机端(≤640px):设备行换行,meta 落到第二行 */
@media (max-width:640px){
  .dev{flex-wrap:wrap;gap:7px 12px;padding:13px 2px}
  .dev .id{min-width:0;flex:1}
  .dev .meta{margin-left:0;flex-basis:100%;gap:26px;justify-content:flex-start}
  .head{gap:14px}
  .head h1{font-size:24px}
}
</style>
</head>
<body>
<canvas id="bg" aria-hidden="true"></canvas>

<main class="wrap">
  <header class="head seq">
    <h1>网络连接<span class="sub">connectivity monitor</span></h1>
    <span class="spacer"></span>
    <div class="pl"><div class="lab">盒子在线</div><div class="bignum" id="pl-online">--</div></div>
    <div class="pl"><div class="lab">后端延迟</div><div class="bignum" id="pl-ping">--</div></div>
  </header>

  <section class="sect seq d1" id="s-box">
    <h2><span class="rn">Ⅰ</span> 盒子 → 后端</h2>
    <div id="box-list"></div>
  </section>

  <section class="sect seq d2" id="s-sess">
    <h2><span class="rn">Ⅱ</span> 后端 → 前端</h2>
    <div class="sess">
      <div class="lat">
        <div class="big" id="lat-now">--<span class="u">ms</span></div>
        <div class="l">往返延迟</div>
        <div class="mmm" id="lat-mmm">--</div>
      </div>
      <div class="right">
        <div class="spark"><canvas id="spark"></canvas></div>
        <div class="kv">
          <div class="row"><span class="k">连接状态</span><span class="v" id="sess-state">检测中…</span></div>
          <div class="row note-row"><span class="con-note" id="sess-note"></span></div>
          <div class="row"><span class="k">后端地址</span><span class="v" id="sess-addr">--</span></div>
          <div class="row"><span class="k">会话 ID</span><span class="v" id="sess-id">--</span></div>
          <div class="row"><span class="k">最近 60 次丢包</span><span class="v" id="sess-loss">--</span></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="statusline seq d3">
    <span class="kind" id="status-kind" style="color:var(--good)">[—]</span>
    <span class="msg" id="status-text">连接监测…</span>
    <span class="ts" id="snapshot">--</span>
  </footer>
</main>

<script>
const $=id=>document.getElementById(id);
const OPS=window.OPS;
const css=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const REDUCED=matchMedia("(prefers-reduced-motion: reduce)").matches;
const esc=s=>String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

/* ── 背景星空 ── */
(function bg(){
  const cv=$("bg"),ctx=cv.getContext("2d");
  let stars=[];let s=7;const rnd=()=>{s^=s<<13;s^=s>>>17;s^=s<<5;return((s>>>0)/4294967296);};
  function seed(){const n=Math.round(innerWidth*innerHeight/16000);
    stars=Array.from({length:n},()=>({x:rnd(),y:rnd(),m:rnd(),ph:rnd()*6.28,sp:.4+rnd()}));}
  seed();addEventListener("resize",seed);
  (function draw(t){
    const w=innerWidth,h=innerHeight,dpr=devicePixelRatio||1;
    if(cv.width!==w*dpr||cv.height!==h*dpr){cv.width=w*dpr;cv.height=h*dpr;}
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.fillStyle=css("--sky-bg");ctx.fillRect(0,0,w,h);
    ctx.fillStyle=css("--sky-star");
    for(const st of stars){const tw=REDUCED?1:(.7+.3*Math.sin(t/1000*st.sp+st.ph));
      ctx.globalAlpha=(.08+st.m*.3)*tw;ctx.beginPath();ctx.arc(st.x*w,st.y*h,st.m>.93?1.5:.8,0,7);ctx.fill();}
    ctx.globalAlpha=1;requestAnimationFrame(draw);
  })(0);
})();

function fmtTime(v){return v?String(v).replace("T"," "):"--";}

/* ════════ Ⅰ 盒子 → 后端(共享,/api/camera-states 缓存)════════ */
let revealed=false;
async function pollStates(){
  try{
    const d=await OPS.fetchJSON("/api/camera-states");
    const devs=d.devices||{};
    const names=Object.keys(devs).sort();
    let online=0;
    const rows=names.map(name=>{
      const cs=devs[name]||{};
      const off=OPS.deriveOnline(cs)===false;
      const partial=!!cs.partial;
      const cam=cs.camera||{}, app=cs.app||{};
      const ip=(cs.device&&cs.device.ip)||"--";
      const age=cs.cache&&cs.cache.age_seconds!=null?cs.cache.age_seconds:null;
      const errs=(cs.errors||[]).length;
      let cls,label;
      if(off){cls="bad";label="未连接";}
      else if(partial||errs){cls="warn";label="受限";online++;}
      else{cls="ok";label="已连接";online++;}
      const lamp=off?"off":(cls==="warn"?"warn":"on");
      const reason=off?"盒子无响应"
        :(cam.name?esc(cam.name)+(app.capture_state?` · ${esc(app.capture_state)}`:""):"已就绪");
      const reasonLab=off?"状态":"相机";
      const freshV=age!=null?(age<90?Math.round(age)+" 秒前":OPS.fmtAgo(age)):"--";
      const errMethods=[...new Set((cs.errors||[]).map(e=>e&&e.method).filter(Boolean))];
      const errSummary=errMethods.length?errMethods.slice(0,4).join(" · ")+(errMethods.length>4?` 等${errMethods.length}项`:""):"";
      return `<div class="dev"${cls==="warn"?` title="${esc("受限 · "+(errSummary?("部分读取异常:"+errSummary):"部分通道暂不可用"))}"`:""}>
        <span class="lamp ${lamp}"></span>
        <span class="id"><b>${esc(name)}</b><span class="ip">${esc(ip)}</span></span>
        <span class="st ${cls}">${label}</span>
        <span class="meta">
          <span class="m"><span class="v ${off?"bad":""}">${freshV}</span><span class="l">最近更新</span></span>
          <span class="m" style="min-width:12em"><span class="proof">${reason}</span><span class="l">${reasonLab}</span></span>
        </span>
      </div>`;
    }).join("");
    $("box-list").innerHTML=rows||"<div class='dev'><span class='lamp'></span><span class='id'>无设备</span></div>";
    $("pl-online").textContent=`${online}/${names.length}`;
    $("status-kind").textContent="[OK]";$("status-kind").style.color="var(--good)";
    $("status-text").textContent="网络连接监测";
    $("snapshot").textContent=fmtTime(d.snapshot_at);
  }catch(e){
    $("box-list").innerHTML="<div class='dev'><span class='lamp off'></span><span class='id'>后端不可达</span></div>";
    $("pl-online").textContent="--";
    $("status-kind").textContent="[ERR]";$("status-kind").style.color="var(--bad)";
    $("status-text").textContent="后端状态不可达:"+(e.message||"");
  }finally{
    if(!revealed){revealed=true;requestAnimationFrame(()=>document.body.classList.add("ready"));}
  }
}

/* ════════ Ⅱ 后端 → 前端(本会话,客户端测 RTT)════════ */
const SAMPLES=[];const MAX=60;
let pendingGap=false;
function drawSpark(){
  const cv=$("spark"),ctx=cv.getContext("2d");
  const w=cv.clientWidth,h=cv.clientHeight,dpr=devicePixelRatio||1;
  if(cv.width!==w*dpr||cv.height!==h*dpr){cv.width=w*dpr;cv.height=h*dpr;}
  ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,w,h);
  const ok=SAMPLES.filter(s=>s.rtt!=null).map(s=>s.rtt);
  if(!ok.length)return;
  const mx=Math.max(40,...ok),pad=6;
  const x=i=>SAMPLES.length<=1?w:(i/(MAX-1))*w;
  const y=v=>h-pad-(v/mx)*(h-2*pad);
  /* 面积 + 线 */
  ctx.beginPath();let started=false;
  SAMPLES.forEach((s,i)=>{if(s.gap||s.rtt==null){started=false;return;}
    const px=x(i+(MAX-SAMPLES.length)),py=y(s.rtt);
    if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);});
  ctx.strokeStyle=css("--ac");ctx.lineWidth=1.5;ctx.stroke();
  /* 丢包红点 */
  ctx.fillStyle=css("--bad");
  SAMPLES.forEach((s,i)=>{if(s.rtt==null&&!s.gap){const px=x(i+(MAX-SAMPLES.length));
    ctx.fillRect(px-1,pad,2,h-2*pad);}});
  ctx.save();ctx.strokeStyle=css("--line");ctx.globalAlpha=.8;ctx.setLineDash([3,3]);ctx.lineWidth=1;
  SAMPLES.forEach((s,i)=>{if(s.gap){const px=x(i+(MAX-SAMPLES.length));ctx.beginPath();ctx.moveTo(px,pad);ctx.lineTo(px,h-pad);ctx.stroke();}});
  ctx.restore();
  /* 最新点 */
  const last=SAMPLES[SAMPLES.length-1];
  if(last&&last.rtt!=null){ctx.fillStyle=css("--ac");ctx.beginPath();
    ctx.arc(x(MAX-1),y(last.rtt),2.5,0,7);ctx.fill();}
}
function renderSess(){
  const oks=SAMPLES.filter(s=>s.rtt!=null).map(s=>s.rtt);
  const last=SAMPLES.length?SAMPLES[SAMPLES.length-1]:null;
  const now=$("lat-now");
  if(last&&last.rtt!=null){now.innerHTML=Math.round(last.rtt)+'<span class="u">ms</span>';now.classList.remove("off");}
  else{now.innerHTML='超时<span class="u"></span>';now.classList.add("off");}
  if(oks.length){const mn=Math.min(...oks),mx=Math.max(...oks),av=oks.reduce((a,b)=>a+b,0)/oks.length;
    $("lat-mmm").textContent=`最小 ${Math.round(mn)} · 平均 ${Math.round(av)} · 最大 ${Math.round(mx)} ms`;}
  const measured=SAMPLES.filter(s=>!s.gap);
  const loss=measured.filter(s=>s.rtt==null).length;
  const pct=measured.length?Math.round(loss/measured.length*100):0;
  const filling=measured.length<MAX;
  $("sess-loss").textContent= measured.length? `${pct}% · ${loss}/${measured.length} 样本${filling?"(窗口填充中)":""}` : "--";
  /* 本会话链路状态以 ping 自身判定(不借用 OPS.conn——那是盒子↔后端的状态) */
  $("sess-state").innerHTML = !SAMPLES.length ? "检测中…"
    : (last&&last.rtt!=null) ? '<span style="color:var(--ac)">已连接</span>'
    : SAMPLES.slice(-3).some(s=>s.rtt!=null) ? '<span style="color:var(--ac-soft)">不稳定</span>'
    : '<span style="color:var(--bad)">未连接</span>';
  $("sess-note").textContent = !SAMPLES.length ? "正在建立首次往返测量…"
    : (last&&last.rtt!=null) ? "链路通畅 · 每 2 秒探测一次往返"
    : SAMPLES.slice(-3).some(s=>s.rtt!=null) ? "近 6 秒内有应答但当前一次超时 · 链路抖动"
    : "近 6 秒内无任何应答 · 后端可能不可达";
  $("pl-ping").textContent=(last&&last.rtt!=null)?Math.round(last.rtt)+" ms":"--";
  drawSpark();
}
async function ping(){
  if(OPS.hidden&&OPS.hidden()){pendingGap=true;return;}
  if(pendingGap){pendingGap=false;SAMPLES.push({gap:true});while(SAMPLES.length>MAX)SAMPLES.shift();}
  const t0=performance.now();
  try{
    const r=await fetch("/api/ping",{cache:"no-store"});
    if(!r.ok)throw 0;
    await r.text();
    SAMPLES.push({rtt:performance.now()-t0});
  }catch(e){SAMPLES.push({rtt:null});}
  while(SAMPLES.length>MAX)SAMPLES.shift();
  renderSess();
}

$("sess-addr").textContent=location.host;
function setSessId(){$("sess-id").textContent=(OPS.sessionId||"--").slice(0,18);}
setSessId();setTimeout(setSessId,1200);  /* OPS.sessionId 异步设,延迟补一次 */
OPS.onConn&&OPS.onConn(()=>renderSess());
addEventListener("resize",drawSpark);

pollStates();setInterval(()=>{if(!OPS.hidden||!OPS.hidden())pollStates();},3000);
ping();setInterval(ping,2000);
</script>
</body>
</html>
